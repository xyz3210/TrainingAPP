// ── STATISTIK ──────────────────────────────────────────────────────────────
const StatistikTab=memo(function StatistikTab({players,sessions,absences}){
  const [view,setView]=useState(null);
  const past=useMemo(()=>sessions.filter(s=>s.date<=TODAY),[sessions]);
  const trainings=useMemo(()=>past.filter(s=>s.type==="Training"),[past]);
  const spiele=useMemo(()=>past.filter(s=>s.type==="Spiel"),[past]);
  const sorted=useMemo(()=>[...players].sort((a,b)=>a.number-b.number),[players]);
  const hasData=players.length>0&&trainings.length>0;

  const statsMap=useMemo(()=>{
    const m={};
    players.forEach(p=>{
      const tP=trainings.filter(s=>s.attendance&&s.attendance[p.id]).length;
      const sP=spiele.filter(s=>s.attendance&&s.attendance[p.id]).length;
      m[p.id]={tP,sP,tPct:trainings.length?Math.round(tP/trainings.length*100):null};
    });
    return m;
  },[players,trainings,spiele]);
  const st=pid=>statsMap[pid]||{tP:0,sP:0,tPct:null};

  // Absence ranking: sort players by total absence days descending
  const absRanking=useMemo(()=>{
    if(!absences||!players.length)return[];
    return players.map(p=>{
      const pAbs=absences.filter(a=>String(a.playerId)===String(p.id));
      const byCat={};
      let total=0;
      pAbs.forEach(a=>{
        const days=a.from&&a.to?(new Date(a.to)-new Date(a.from))/(86400000)+1:0;
        total+=days;
        byCat[a.category]=(byCat[a.category]||0)+1;
      });
      return{pid:p.id,num:p.number,name:p.name,total:Math.round(total),byCat};
    }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
  },[absences,players]);

  const triggerPrint=()=>{
    const sid="sps";let el=document.getElementById(sid);
    if(!el){el=document.createElement("style");el.id=sid;document.head.appendChild(el);}
    el.textContent="@media print{body>*{display:none!important}#spr{display:block!important;position:static!important}}";
    setTimeout(()=>window.print(),80);
  };

  if(view==="summary"||view==="detail"){
    const isSum=view==="summary";
    const title=isSum?"Zusammenfassung":"Detailbericht";
    return <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setView(null)} style={{background:"#E5E5EA",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Zurück</button>
        <div style={{flex:1,fontSize:16,fontWeight:700,color:"#1C1C1E"}}>{title}</div>
        <button onClick={triggerPrint} style={{background:"#007AFF",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Drucken</button>
      </div>
      <div id="spr">
        <div style={{marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:800,color:"#1C1C1E"}}>{isSum?"Trainingsbeteiligung":"Detailbericht Trainingsbeteiligung"}</div>
          <div style={{fontSize:12,color:"#8E8E93",marginTop:2}}>{trainings.length} Trainings · {players.length} Spieler · {fmtD(TODAY)}</div>
        </div>
        {isSum&&<div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
          <div style={{display:"grid",gridTemplateColumns:"28px 1fr 70px 60px",background:"#F2F2F7",padding:"7px 13px"}}>
            {["#","Spieler","Training","Quote"].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:"#6D6D72",textTransform:"uppercase",letterSpacing:.4}}>{h}</div>)}          </div>
          {sorted.map((p,i)=>{
            const{tP,tPct}=st(p.id);const pct=tPct??0;const col=pct>=75?"#34C759":pct>=50?"#FF9500":"#FF3B30";
            return <div key={p.id} style={{display:"grid",gridTemplateColumns:"28px 1fr 70px 60px",padding:"9px 13px",borderBottom:i<sorted.length-1?"1px solid #F2F2F7":"none",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#007AFF"}}>{p.number}</span>
              <span style={{fontSize:13,fontWeight:600,color:"#1C1C1E"}}>{p.name}</span>
              <span style={{fontSize:12,color:"#3C3C43"}}>{tP}/{trainings.length}</span>
              <div><div style={{fontSize:11,fontWeight:700,color:col,marginBottom:3}}>{tPct!==null?tPct+"%":"?"}</div><div style={{height:4,background:"#F2F2F7",borderRadius:2}}><div style={{height:"100%",width:pct+"%",background:col,borderRadius:2}}/></div></div>
            </div>;
          })}
        </div>}
        {!isSum&&sorted.map(p=>{
          const{tP,sP,tPct}=st(p.id);
          return <div key={p.id} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 13px",background:"#007AFF",borderRadius:"10px 10px 0 0"}}>
              <span style={{fontSize:12,fontWeight:800,color:"rgba(255,255,255,.8)",minWidth:22}}>{p.number}</span>
              <span style={{fontSize:14,fontWeight:700,color:"#fff",flex:1}}>{p.name}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.8)"}}>Training {tP}/{trainings.length}{tPct!==null?" ("+tPct+"%)":""} Spiele {sP}/{spiele.length}</span>
            </div>
            <div style={{background:"#fff",borderRadius:"0 0 10px 10px",overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
              {trainings.length===0?<div style={{padding:"10px 13px",fontSize:13,color:"#C7C7CC"}}>Keine Trainings</div>:
                trainings.map((s,i)=>{
                  const present=s.attendance&&s.attendance[p.id];
                  const reason=s.absenceReasons&&s.absenceReasons[p.id];
                  return <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 13px",borderBottom:i<trainings.length-1?"1px solid #F2F2F7":"none"}}>
                    <span style={{fontSize:12,color:"#8E8E93",minWidth:85}}>{fmtD(s.date)}</span>
                    <span style={{fontSize:12,color:"#8E8E93"}}>{s.time} Uhr</span>
                    {s.intensity&&<span style={{fontSize:10,fontWeight:700,color:{"Leicht":"#34C759","Mittel":"#FF9500","Hart":"#FF3B30"}[s.intensity]||"#8E8E93",background:({"Leicht":"#34C759","Mittel":"#FF9500","Hart":"#FF3B30"}[s.intensity]||"#8E8E93")+"18",padding:"1px 7px",borderRadius:10,flexShrink:0}}>{s.intensity}</span>}
                    <span style={{fontSize:14,fontWeight:700,color:present?"#34C759":"#FF3B30",marginLeft:"auto"}}>{present?"v":"x"}</span>
                    {!present&&reason&&<Badge label={reason} color={catOf(reason).color}/>}
                  </div>;
                })
              }
            </div>
          </div>;
        })}
      </div>
    </div>;
  }

  return <div>
    <SecHdr title="Statistiken" count={null} unit={null}/>
    {!hasData&&<Empty icon="📊" text={players.length===0?"Noch keine Spieler im Kader":"Noch keine Trainings erfasst"}/>}
    {hasData&&<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {[
          {label:"Ø Beteiligung",value:(()=>{const v=players.map(p=>st(p.id).tPct||0);return Math.round(v.reduce((a,b)=>a+b,0)/v.length)+"%";})(),color:"#007AFF"},
          {label:"Trainings",value:trainings.length,color:"#34C759"},
          {label:"Spiele",value:spiele.length,color:"#FF3B30"},
          {label:"Spieler",value:players.length,color:"#AF52DE"},
        ].map(s=>(
          <div key={s.label} style={{background:"#fff",borderRadius:12,padding:"13px",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:24,fontWeight:800,color:s.color}}>{s.value}</div>
            <div style={{fontSize:12,color:"#8E8E93",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"13px",marginBottom:14,boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Trainingsquote</div>
        {sorted.map(p=>{
          const{tP,tPct}=st(p.id);const pct=tPct??0;const col=pct>=75?"#34C759":pct>=50?"#FF9500":"#FF3B30";
          return <div key={p.id} style={{marginBottom:9}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:13,color:"#1C1C1E"}}><span style={{color:"#007AFF",fontWeight:700,marginRight:5}}>{p.number}</span>{p.name}</span>
              <span style={{fontSize:12,fontWeight:700,color:col}}>{tP}/{trainings.length} {tPct!==null?tPct+"%":"?"}</span>
            </div>
            <div style={{height:5,background:"#F2F2F7",borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:col,borderRadius:3}}/></div>
          </div>;
        })}
      </div>

      {/* Intensity load chart */}
      {trainings.some(s=>s.intensity)&&(()=>{
        const INTENSITY_KEYS=["Leicht","Mittel","Hart"];
        const INTENSITY_COLORS={"Leicht":"#34C759","Mittel":"#FF9500","Hart":"#FF3B30"};
        const INTENSITY_VAL={"Leicht":1,"Mittel":2,"Hart":3};
        // Last 10 trainings with intensity, oldest first
        const recent=[...trainings].filter(s=>s.intensity).sort((a,b)=>a.date.localeCompare(b.date)).slice(-10);
        const counts=INTENSITY_KEYS.reduce((m,k)=>{m[k]=trainings.filter(s=>s.intensity===k).length;return m;},{});
        return <div style={{background:"#fff",borderRadius:14,padding:"13px",marginBottom:14,boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Belastungsverlauf</div>
          {/* Distribution pills */}
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {INTENSITY_KEYS.map(k=>(
              <div key={k} style={{flex:1,textAlign:"center",background:INTENSITY_COLORS[k]+"15",borderRadius:10,padding:"8px 4px"}}>
                <div style={{fontSize:18,fontWeight:800,color:INTENSITY_COLORS[k]}}>{counts[k]}</div>
                <div style={{fontSize:10,fontWeight:600,color:INTENSITY_COLORS[k]}}>{k}</div>
              </div>
            ))}
          </div>
          {/* Bar chart of last 10 sessions */}
          {recent.length>1&&<>
            <div style={{fontSize:10,fontWeight:700,color:"#C7C7CC",textTransform:"uppercase",letterSpacing:.4,marginBottom:8}}>Letzte {recent.length} Trainings</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:50}}>
              {recent.map((s,i)=>{
                const h=INTENSITY_VAL[s.intensity||"Mittel"];
                const col=INTENSITY_COLORS[s.intensity||"Mittel"];
                return <div key={s.id} title={fmtD(s.date)+" · "+s.intensity} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{width:"100%",background:col,borderRadius:"3px 3px 0 0",height:h===3?44:h===2?28:14,transition:"height .3s"}}/>
                  <div style={{fontSize:7,color:"#C7C7CC",writingMode:"vertical-rl",transform:"rotate(180deg)",lineHeight:1}}>{fmtD(s.date).slice(0,5)}</div>
                </div>;
              })}
            </div>
          </>}
        </div>;
      })()}

      <div style={{fontSize:13,fontWeight:700,color:"#3C3C43",marginBottom:8}}>Berichte</div>
      {[
        {key:"summary",icon:"📊",title:"Trainingsbeteiligung – Zusammenfassung",desc:"Beteiligungsquote je Spieler"},
        {key:"detail", icon:"📋",title:"Trainingsbeteiligung – Detailbericht",  desc:"Alle Trainings je Spieler"},
      ].map(r=>(
        <Card key={r.key} onClick={()=>setView(r.key)} style={{marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:10,background:"#007AFF15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{r.icon}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#1C1C1E"}}>{r.title}</div><div style={{fontSize:12,color:"#8E8E93",marginTop:2}}>{r.desc}</div></div>
            <span style={{fontSize:18,color:"#C7C7CC"}}>{">"}</span>
          </div>
        </Card>
      ))}

      {/* Abwesenheits-Ranking */}
      {absRanking.length>0&&<>
        <div style={{fontSize:13,fontWeight:700,color:"#3C3C43",marginBottom:8,marginTop:4}}>Abwesenheits-Ranking</div>
        <div style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
          {absRanking.map((r,i)=>(
            <div key={r.pid} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 13px",borderBottom:i<absRanking.length-1?"1px solid #F2F2F7":"none"}}>
              <span style={{fontSize:13,fontWeight:700,color:"#007AFF",minWidth:22,textAlign:"right"}}>{r.num}</span>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:"#1C1C1E"}}>{r.name}</span>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                {CATS.map(c=>{const cnt=r.byCat[c.key];return cnt?<Badge key={c.key} label={c.key+" "+cnt+"x"} color={c.color}/>:null;})}
              </div>
              <span style={{fontSize:12,fontWeight:700,color:"#FF3B30",minWidth:28,textAlign:"right"}}>{r.total}d</span>
            </div>
          ))}
        </div>
      </>}
    </>}
  </div>;
}
);

const EinstellungenTab=memo(function EinstellungenTab({saison,setSaison,players,sessions,absences,setSessions,setAbsences,setFormations,allData,restoreData,ghConfig,saveGhConfig,loadFromGitHub,ghEnabled}){
  const [confirm,setConfirm]=useState(null);

  const [ghMsg,setGhMsg]=useState("");

  const exportBackup=()=>{
    const json=JSON.stringify(allData(),null,2);

    a.download="meinteam-backup-"+TODAY+".json";

  const importBackup=e=>{

        if(!d.players||!Array.isArray(d.players))throw new Error("Ungültiges Format");

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{width:38,height:38,borderRadius:10,background:"#007AFF15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>🔖</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1C1C1E"}}>Lesezeichen-URL</div>

        {window.location.href.length>80?window.location.href.slice(0,80)+"…":window.location.href}

      </div>

const DashboardTab=memo(function DashboardTab({players,sessions,absences,setTab}){
  const past     = useMemo(()=>sessions.filter(s=>s.date<=TODAY),[sessions]);
  const future   = useMemo(()=>sessions.filter(s=>s.date>TODAY).sort((a,b)=>a.date.localeCompare(b.date)),[sessions]);
  const trainings= useMemo(()=>past.filter(s=>s.type==="Training"),[past]);
  const spiele   = useMemo(()=>past.filter(s=>s.type==="Spiel"),[past]);

  // Next session
  const next = future[0]||null;

  // Birthdays today or in next 7 days
  const in7 = useCallback(d=>{const ds=nextBd(d);const diff=(new Date(ds)-new Date(TODAY))/86400000;return diff>=0&&diff<=7;},[]);
  const bdToday  = useMemo(()=>players.filter(p=>nextBd(p.birthdate)===TODAY),[players]);
  const bdSoon   = useMemo(()=>players.filter(p=>nextBd(p.birthdate)!==TODAY&&in7(p.birthdate)),[players,in7]);

  // Currently absent players
  const currentlyAbsent = useMemo(()=>players.filter(p=>getAbs(absences,p.id,TODAY)),[players,absences]);

  // Avg training participation
  const avgPct = useMemo(()=>trainings.length&&players.length ? Math.round(
    players.map(p=>trainings.filter(s=>s.attendance&&s.attendance[p.id]).length/trainings.length*100)
      .reduce((a,b)=>a+b,0)/players.length
  ) : null,[trainings,players]);

  // Availability for next 3 days
  const next3Days = useMemo(()=>{
    const DAYS_DE=["So","Mo","Di","Mi","Do","Fr","Sa"];
    return [0,1,2,3,4,5,6].map(offset=>{
      const d=new Date(TODAY);d.setDate(d.getDate()+offset);
      const ds=d.toISOString().split("T")[0];
      const absent=players.filter(p=>getAbs(absences,p.id,ds));
      const available=players.length-absent.length;
      const label=offset===0?"Heute":offset===1?"Mo.":DAYS_DE[d.getDay()]+".";
      const pct=players.length>0?Math.round(available/players.length*100):null;
      return {ds,label,available,absent:absent.length,total:players.length,pct};
    });
  },[players,absences]);


  return <div>

    {/* Birthday banners */}
    {bdToday.length>0&&<div style={{background:"linear-gradient(135deg,#FF9500,#FFCC02)",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:20}}>🎂</span>
        <span style={{fontSize:13,fontWeight:800,color:"#fff"}}>Heute Geburtstag!</span>
      </div>
      {bdToday.map(p=>(
        <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,.2)",borderRadius:9,padding:"7px 10px",marginTop:4}}>
          <div style={{width:30,height:30,borderRadius:15,background:"rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>
            {p.number}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{p.name}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.85)"}}>wird heute {age(p.birthdate)} Jahre</div>
          </div>
          <span style={{fontSize:20}}>🥳</span>
        </div>
      ))}
    </div>}

    {bdSoon.length>0&&<BdSoonCard bdSoon={bdSoon} nextBd={nextBd} age={age}/>}

    {/* KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
      <KpiBox value={players.length} label="Spieler im Kader" color="#007AFF"/>
      <KpiBox value={avgPct!==null?avgPct+"%":"–"} label="Ø Trainingsbeteiligung" color={avgPct===null?"#C7C7CC":avgPct>=75?"#34C759":avgPct>=50?"#FF9500":"#FF3B30"}/>
      <KpiBox value={trainings.length} label="Trainings gesamt" color="#34C759" sub={spiele.length+" Spiele"}/>
      <KpiBox value={currentlyAbsent.length} label="Aktuell abwesend" color={currentlyAbsent.length>0?"#FF3B30":"#34C759"}/>
    </div>

    {/* 3-day availability */}
    {players.length>0&&<>
      <SectionLabel text="Spielerverfügbarkeit"/>
      <div style={{background:"#fff",borderRadius:14,padding:"14px",marginBottom:14,boxShadow:"0 1px 2px rgba(0,0,0,.05)"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {next3Days.map(d=>{
            const col=d.pct===null?"#C7C7CC":d.pct>=80?"#34C759":d.pct>=60?"#FF9500":"#FF3B30";
            const arc=Math.round((d.pct||0)*0.879);
            return (
              <div key={d.ds} style={{textAlign:"center"}}>
                <div style={{fontSize:9,fontWeight:700,color:"#8E8E93",marginBottom:4}}>{d.label}</div>
                <div style={{position:"relative",width:"100%",paddingBottom:"100%",margin:"0 auto 4px"}}>
                  <svg viewBox="0 0 36 36" style={{position:"absolute",inset:0,width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
                    <circle cx="18" cy="18" r="14" fill="none" stroke="#F2F2F7" strokeWidth="4"/>
                    <circle cx="18" cy="18" r="14" fill="none" stroke={col} strokeWidth="4"
                      strokeDasharray={arc+" "+Math.round(87.9-arc)}
                      strokeLinecap="round"/>
                  </svg>
                  <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:12,fontWeight:800,color:"#1C1C1E",lineHeight:1}}>{d.available}</span>
                  </div>
                </div>
                <div style={{fontSize:9,fontWeight:700,color:col}}>{d.pct!==null?d.pct+"%":"–"}</div>
              </div>
            );
          })}
        </div>
      </div>
    </>}

    {/* Next session */}
    {next&&<>
      <SectionLabel text="Nächste Einheit"/>
      <Card onClick={()=>setTab("einheiten")}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{width:36,height:36,borderRadius:10,background:(next.type==="Spiel"?"#FF3B30":"#007AFF")+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{next.type==="Spiel"?"⚽":"🏃"}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1C1C1E"}}>{next.type}{next.note?<span style={{fontWeight:400,color:"#8E8E93"}}> · {next.note}</span>:""}</div>
            <div style={{fontSize:12,color:"#8E8E93",marginTop:1}}>{fmt(next.date)} · {next.time} Uhr</div>
          </div>
          <span style={{fontSize:18,color:"#C7C7CC"}}>{">"}</span>
        </div>
      </Card>
    </>}

    {/* Currently absent */}
    {currentlyAbsent.length>0&&<>
      <SectionLabel text="Aktuell abwesend"/>
      {currentlyAbsent.map(p=>{
        const ab=getAbs(absences,p.id,TODAY);
        const cat=catOf(ab.category);
        return <Card key={p.id} onClick={()=>setTab("abwesenheiten")}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,fontWeight:700,color:"#007AFF",minWidth:22,textAlign:"right"}}>{p.number}</span>
            <span style={{flex:1,fontSize:14,fontWeight:600,color:"#1C1C1E"}}>{p.name}</span>
            <Badge label={ab.category} color={cat.color}/>
            <span style={{fontSize:12,color:"#8E8E93"}}>bis {fmtD(ab.to)}</span>
          </div>
        </Card>;
      })}
    </>}

  </div>;
}
);

// ── Responsive hook ─────────────────────────────────────────────────────────
function useWindowWidth(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}


const TABS=[
  {key:"kader",       label:"Kader",        icon:"👥"},
  {key:"abwesenheiten",label:"Abwesenheiten",icon:"📅"},
  {key:"einheiten",   label:"Einheiten",    icon:"📋"},
  {key:"kalender",    label:"Kalender",     icon:"🗓️"},
  {key:"taktik",      label:"Taktik",       icon:"🧩"},
  {key:"statistik",   label:"Statistik",    icon:"📊"},
];

function App(){
  const [tab,setTab]=useState("dashboard");  const [players,setPlayers]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [absences,setAbsences]=useState([]);
  const [formations,setFormations]=useState([]);
  const [saison,setSaison]=useState("");
  const loadedRef=useRef(false);
  const w=useWindowWidth();
  const isDesktop=w>=900;
  const isTablet=w>=600&&w<900;
  const isMobile=w<600;

  // Content max width based on screen
  const contentMax=isDesktop?1200:isTablet?900:600;
  const taktikIdxRef=useRef(0);
  const scrollRef=useRef(null);

  // ── Keyboard / viewport fix — prevent page jump when keyboard opens ───────
  useEffect(()=>{
    // Fix viewport meta for mobile keyboard handling
    let meta=document.querySelector("meta[name=viewport]");
    if(!meta){meta=document.createElement("meta");meta.name="viewport";document.head.appendChild(meta);}
    meta.content="width=device-width,initial-scale=1,interactive-widget=resizes-content";

    const vv=window.visualViewport;
    if(!vv)return;
    const onResize=()=>{
      const el=document.getElementById("app-root");
      if(el)el.style.height=vv.height+"px";
    };
    vv.addEventListener("resize",onResize);
    vv.addEventListener("scroll",onResize);
    return()=>{vv.removeEventListener("resize",onResize);vv.removeEventListener("scroll",onResize);};
  },[]);

  // ── Pull-to-Refresh via native non-passive listeners ─────────────────────
  const [ptrState,setPtrState]=useState("idle");
  const ptrRef=useRef({startY:0,pulling:false,dist:0});
  const PTR_THRESHOLD=72;
  // stable ref so the useEffect never needs to re-attach for github config changes
  const ptrRefreshFn=useRef(null);

  useEffect(()=>{
    const el=scrollRef.current;
    if(!el)return;

    const onStart=e=>{
      if(tab==="taktik")return;
      if(el.scrollTop>0)return;
      if(e.target.closest("[data-uid]")||e.target.closest("select")||e.target.closest("input"))return;
      ptrRef.current={startY:e.touches[0].clientY,pulling:true,dist:0};
    };

    const onMove=e=>{
      if(!ptrRef.current.pulling)return;
      const dist=Math.max(0,e.touches[0].clientY-ptrRef.current.startY);
      if(dist>4&&el.scrollTop===0){
        e.preventDefault();
        ptrRef.current.dist=Math.min(dist,120);
        setPtrState(ptrRef.current.dist>=PTR_THRESHOLD?"releasing":"pulling");
      }else if(dist<=4){
        ptrRef.current.pulling=false;
        setPtrState("idle");
      }
    };

    const onEnd=async()=>{
      if(!ptrRef.current.pulling)return;
      const dist=ptrRef.current.dist;
      ptrRef.current={startY:0,pulling:false,dist:0};
      if(dist<PTR_THRESHOLD){setPtrState("idle");return;}
      setPtrState("refreshing");
      try{ if(ptrRefreshFn.current) await ptrRefreshFn.current(); }
      catch(e){console.log("ptr error",e);}
      setTimeout(()=>setPtrState("idle"),600);
    };

    el.addEventListener("touchstart",onStart,{passive:true});
    el.addEventListener("touchmove",onMove,{passive:false});
    el.addEventListener("touchend",onEnd,{passive:true});
    return()=>{
      el.removeEventListener("touchstart",onStart);
      el.removeEventListener("touchmove",onMove);
      el.removeEventListener("touchend",onEnd);
    };
  },[tab]);

  const swipeRef=useRef({x:0,y:0,active:false});
  const tabKeys=TABS.map(t=>t.key);
  const ghShaRef=useRef(null); // stores current file SHA for GitHub updates

  // ── GitHub config (stored in localStorage, not in app data) ──────────────
  const [ghConfig,setGhConfig]=useState(()=>{
    try{
      // Try localStorage first, then sessionStorage as fallback
      const ls=localStorage.getItem("gh-config");
      const ss=sessionStorage.getItem("gh-config");
      const raw=ls||ss||"null";
      return JSON.parse(raw)||{token:"",repo:"",branch:"main",path:"team-data.json"};
    }
    catch{return {token:"",repo:"",branch:"main",path:"team-data.json"};}
  });
  const ghEnabled=ghConfig.token&&ghConfig.repo;

  const saveGhConfig=cfg=>{
    setGhConfig(cfg);
    try{localStorage.setItem("gh-config",JSON.stringify(cfg));}catch(e){}
    try{sessionStorage.setItem("gh-config",JSON.stringify(cfg));}catch(e){}
  };

  // ── GitHub API helpers ────────────────────────────────────────────────────
  const ghHeaders=useCallback(()=>({
    "Authorization":"token "+ghConfig.token,
    "Accept":"application/vnd.github.v3+json",
    "Content-Type":"application/json",
  }),[ghConfig.token]);

  const ghUrl=useCallback(()=>`https://api.github.com/repos/${ghConfig.repo}/contents/${ghConfig.path}`,[ghConfig.repo,ghConfig.path]);

  const loadFromGitHub=useCallback(async()=>{
    const res=await fetch(ghUrl()+"?ref="+ghConfig.branch,{headers:ghHeaders()});
    if(!res.ok)throw new Error("GitHub Fehler "+res.status);
    const file=await res.json();
    ghShaRef.current=file.sha;
    const json=atob(file.content.replace(/\n/g,""));
    return JSON.parse(json);
  },[ghUrl,ghHeaders,ghConfig.branch]);

  // Keep ptrRefreshFn ref up to date with current gh config
  useEffect(()=>{
    ptrRefreshFn.current=async()=>{
      if(ghEnabled){
        const d=await loadFromGitHub();
        setPlayers(d.players||[]);setSessions(d.sessions||[]);
        setAbsences(d.absences||[]);setFormations(d.formations||[]);setSaison(d.saison||"");
      }else{
        const r=await window.storage.get("fm-data");
        if(r){const d=JSON.parse(r.value);setPlayers(d.players||[]);setSessions(d.sessions||[]);setAbsences(d.absences||[]);setFormations(d.formations||[]);setSaison(d.saison||"");}
      }
    };
  },[ghEnabled,loadFromGitHub]);

  const saveToGitHub=useCallback(async(data)=>{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const body={message:"Team update "+new Date().toISOString().slice(0,16),content,branch:ghConfig.branch};
    // Always try with SHA first if we have it (update), otherwise omit (create)
    if(ghShaRef.current)body.sha=ghShaRef.current;
    let res=await fetch(ghUrl(),{method:"PUT",headers:ghHeaders(),body:JSON.stringify(body)});
    // If 422 (SHA mismatch) or 409 (conflict), re-fetch SHA and retry once
    if(res.status===422||res.status===409){
      const getRes=await fetch(ghUrl()+"?ref="+ghConfig.branch,{headers:ghHeaders()});
      if(getRes.ok){const f=await getRes.json();ghShaRef.current=f.sha;body.sha=f.sha;}
      else{delete body.sha;} // file doesn't exist yet, try without SHA
      res=await fetch(ghUrl(),{method:"PUT",headers:ghHeaders(),body:JSON.stringify(body)});
    }
    if(!res.ok)throw new Error("GitHub Save Fehler "+res.status);
    const result=await res.json();
    ghShaRef.current=result.content.sha;
  },[ghUrl,ghHeaders,ghConfig.branch]);

  // WhatsApp modal
  const [waOpen,setWaOpen]=useState(false);
  const [waCopied,setWaCopied]=useState("");
  const [freeText,setFreeText]=useState("");
  const fmtDE=d=>d?d.split("-").reverse().join("."):"";
  const nextSession=useMemo(()=>[...sessions].filter(s=>s.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date))[0]||null,[sessions]);
  const WA_TEMPLATES=useMemo(()=>{
    const ns=nextSession,day=ns?fmtDE(ns.date):"TT.MM",time=ns?ns.time:"18:00",type=ns?ns.type:"Training",opp=ns&&ns.opponent?" gegen "+ns.opponent:"";
    return [
      {label:"Trainingseinladung",icon:"🏃",text:"Hallo zusammen!\n\nHinweis: "+type+opp+"\nDatum: "+day+"\nUhrzeit: "+time+" Uhr\n\nBitte meldet euch bis spätestens eine Stunde vorher ab, falls ihr nicht kommen könnt.\n\nBis dann! ⚽"},
      {label:"Spieltag-Erinnerung",icon:"⚽",text:"Spieltag-Erinnerung!\n\n"+type+opp+"\nDatum: "+day+"\nAnpfiff: "+time+" Uhr\n\nBitte pünktlich erscheinen. Los geht's! 💪"},
      {label:"Freie Vorlage",icon:"✏️",text:"",editable:true},
    ];
  },[nextSession]);
  const sendWhatsApp=txt=>{window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");};
  const copyText=async(txt,key)=>{
    try{await navigator.clipboard.writeText(txt);}
    catch{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
    setWaCopied(key);setTimeout(()=>setWaCopied(""),2000);
  };

  // ── Swipe navigation ────────────────────────────────────────────────────
  const onTouchStart=useCallback(e=>{
    // Don't capture swipes that start on the taktik field
    if(e.target.closest("[data-uid]")||e.target.closest("select")||e.target.closest("input")||e.target.closest("button"))return;
    swipeRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY,active:true};
  },[]);

  const onTouchEnd=useCallback(e=>{
    if(!swipeRef.current.active)return;
    swipeRef.current.active=false;
    const dx=e.changedTouches[0].clientX-swipeRef.current.x;
    const dy=e.changedTouches[0].clientY-swipeRef.current.y;
    // Only horizontal swipes wider than 60px and more horizontal than vertical
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
    setTab(cur=>{
      const i=tabKeys.indexOf(cur);
      if(dx<0&&i<tabKeys.length-1)return tabKeys[i+1];
      if(dx>0&&i>0)return tabKeys[i-1];
      return cur;
    });
  },[tabKeys]);


  useEffect(()=>{
    (async()=>{
      try{
        // 1. Try GitHub if configured
        if(ghEnabled){
          try{
            const d=await loadFromGitHub();
            setPlayers(d.players||[]);setSessions(d.sessions||[]);
            setAbsences(d.absences||[]);setFormations(d.formations||[]);setSaison(d.saison||"");
            loadedRef.current=true;return;
          }catch(e){console.log("GitHub load failed, falling back:",e.message);}
        }
        // 2. Try URL hash (bookmark restore)
        const hash=window.location.hash;
        if(hash.startsWith("#d=")){
          try{
            const d=JSON.parse(decodeURIComponent(escape(atob(hash.slice(3)))));
            if(d&&Array.isArray(d.players)){
              setPlayers(d.players||[]);setSessions(d.sessions||[]);
              setAbsences(d.absences||[]);setFormations(d.formations||[]);setSaison(d.saison||"");
              loadedRef.current=true;return;
            }
          }catch(e){console.log("hash parse error",e);}
        }
        // 3. Fall back to window.storage
        const r=await window.storage.get("fm-data");
        if(r){const d=JSON.parse(r.value);setPlayers(d.players||[]);setSessions(d.sessions||[]);setAbsences(d.absences||[]);setFormations(d.formations||[]);setSaison(d.saison||"");}
      }catch(e){console.log("load error",e);}
      finally{loadedRef.current=true;}
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  const [saved,setSaved]=useState(false);
  const [ghSaving,setGhSaving]=useState(false);
  const [ghError,setGhError]=useState("");

  useEffect(()=>{
    if(!loadedRef.current)return;
    const t=setTimeout(async()=>{
      try{
        const data={players,sessions,absences,formations,saison};
        const json=JSON.stringify(data);
        // Always save locally
        await window.storage.set("fm-data",json);
        const encoded=btoa(unescape(encodeURIComponent(json)));
        window.location.hash="d="+encoded;
        // Also save to GitHub if configured
        if(ghEnabled){
          setGhSaving(true);setGhError("");
          try{
            await saveToGitHub(data);
          }catch(e){
            setGhError(e.message);
            console.log("GitHub save error:",e.message);
          }finally{setGhSaving(false);}
        }
        setSaved(true);setTimeout(()=>setSaved(false),1500);
      }catch(e){console.log("save error",e);}
    },800);
    return()=>clearTimeout(t);
  },[players,sessions,absences,formations,saison,ghEnabled,saveToGitHub]);

  // Stable setter callbacks — prevent child re-renders from new function references
  const allData    = useCallback(()=>({players,sessions,absences,formations,saison}),[players,sessions,absences,formations,saison]);
  const restoreData= useCallback(d=>{setPlayers(d.players||[]);setSessions(d.sessions||[]);setAbsences(d.absences||[]);setFormations(d.formations||[]);setSaison(d.saison||"");},[]);

  return (
    <div id="app-root" style={{fontFamily:"-apple-system,'SF Pro Display','Helvetica Neue',sans-serif",background:"#F2F2F7",minHeight:"100dvh",height:"100dvh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <style>{"@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#E5E5EA;border-radius:2px}"}</style>

      {/* Top header */}
      <div style={{background:"rgba(242,242,247,.95)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(0,0,0,.07)",flexShrink:0,zIndex:100,position:"relative"}}>
        <div style={{maxWidth:isDesktop?1200:isTablet?900:600,margin:"0 auto",padding:"10px 16px 8px",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setTab("dashboard")} style={{background:tab==="dashboard"?"#007AFF":"#E5E5EA",border:"none",borderRadius:20,padding:"5px 16px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",boxShadow:tab==="dashboard"?"0 2px 8px rgba(0,122,255,.3)":"none"}}>
            <span style={{fontSize:13}}>🏠</span>
            <span style={{fontSize:12,fontWeight:700,color:tab==="dashboard"?"#fff":"#3C3C43"}}>Dashboard</span>
          </button>
          <div style={{flex:1}}/>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {saved&&<div style={{background:"#34C75920",border:"1px solid #34C75940",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,color:"#34C759"}}>✓</div>}
            {ghSaving&&<div style={{background:"#007AFF15",border:"1px solid #007AFF30",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,color:"#007AFF"}}>↑ GitHub</div>}
            {ghError&&<div title={ghError} style={{background:"#FF3B3015",border:"1px solid #FF3B3030",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,color:"#FF3B30",cursor:"help"}}>⚠ GitHub</div>}
            {ghEnabled&&!ghSaving&&!ghError&&!saved&&<div style={{background:"#34C75910",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,color:"#34C759"}}>⊙ GitHub</div>}
            <button onClick={()=>setWaOpen(true)} style={{background:"none",border:"none",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer"}}>💬</button>
            <button onClick={()=>setTab("einstellungen")} style={{background:tab==="einstellungen"?"#007AFF15":"none",border:"none",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer"}}>⚙️</button>
          </div>
        </div>
      </div>

      {/* Main layout */}
      <div style={{flex:1,display:"flex",overflow:"hidden",maxWidth:isDesktop?1200:isTablet?900:600,width:"100%",margin:"0 auto",alignSelf:"center",width:"100%"}}>

        {/* Sidebar — tablet & desktop */}
        {!isMobile&&<div style={{width:isDesktop?200:64,flexShrink:0,background:"rgba(242,242,247,.97)",borderRight:"1px solid rgba(0,0,0,.07)",display:"flex",flexDirection:"column",padding:isDesktop?"16px 12px":"12px 8px",gap:4,overflowY:"auto"}}>
          {TABS.map(t=>{
            const active=tab===t.key;
            return <button key={t.key} onClick={()=>setTab(t.key)} style={{display:"flex",alignItems:"center",gap:isDesktop?10:0,justifyContent:isDesktop?"flex-start":"center",padding:isDesktop?"10px 12px":"10px",borderRadius:12,border:"none",cursor:"pointer",background:active?"#007AFF":"transparent",color:active?"#fff":"#3C3C43",fontWeight:active?700:500,fontSize:13,fontFamily:"inherit",transition:"background .15s",width:"100%"}}>
              <span style={{fontSize:isDesktop?18:22,flexShrink:0}}>{t.icon}</span>
              {isDesktop&&<span style={{flex:1,textAlign:"left"}}>{t.label}</span>}
            </button>;
          })}
        </div>}

        {/* Content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>

          {/* WhatsApp Modal */}
          {waOpen&&<Modal center title="WhatsApp Vorlagen" onClose={()=>setWaOpen(false)}>
            <div style={{fontSize:12,color:"#8E8E93",marginBottom:12}}>{nextSession?"Nächste Einheit: "+nextSession.type+" am "+fmtDE(nextSession.date)+" · "+nextSession.time+" Uhr":"Keine anstehende Einheit"}</div>
            {WA_TEMPLATES.map((t,i)=>{
              const txt=t.editable?freeText:t.text;const key="wa"+i;
              return <div key={key} style={{borderTop:i===0?"none":"1px solid #F2F2F7",paddingTop:i===0?0:12,marginTop:i===0?0:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:t.editable?6:8}}>
                  <span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#1C1C1E",flex:1}}>{t.label}</span>
                  <button onClick={()=>copyText(txt,key)} style={{background:waCopied===key?"#34C75915":"#F2F2F7",color:waCopied===key?"#34C759":"#3C3C43",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>{waCopied===key?"✓ Kopiert":"Kopieren"}</button>
                  <button onClick={()=>sendWhatsApp(txt)} style={{background:"#25D36615",color:"#25D366",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>WhatsApp</button>
                </div>
                {t.editable?<textarea value={freeText} onChange={e=>setFreeText(e.target.value)} placeholder="Eigene Nachricht..." rows={4} style={{width:"100%",background:"#F8F8F8",border:"1.5px solid #E5E5EA",borderRadius:10,padding:"9px 12px",fontSize:13,fontFamily:"inherit",color:"#1C1C1E",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>:<div style={{background:"#F8F8F8",borderRadius:10,padding:"9px 12px",fontSize:12,color:"#6D6D72",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{txt}</div>}
              </div>;
            })}
          </Modal>}

          {/* Scroll area */}
          <div ref={scrollRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{flex:1,padding:tab==="taktik"?(isDesktop?"16px 24px 24px":"13px 13px 16px"):(isDesktop?"20px 32px 32px":isTablet?"16px 20px 20px":"13px 13px 88px"),overflowY:tab==="taktik"?"hidden":"auto",WebkitOverflowScrolling:"touch"}}>

            {ptrState!=="idle"&&tab!=="taktik"&&(<div style={{position:"sticky",top:-60,left:0,right:0,display:"flex",alignItems:"center",justifyContent:"center",gap:8,height:50,marginTop:-50,marginBottom:4,opacity:ptrState==="refreshing"?1:.85}}>
              <div style={{width:32,height:32,borderRadius:16,background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,.12)",display:"flex",alignItems:"center",justifyContent:"center",animation:ptrState==="refreshing"?"spin .7s linear infinite":"none"}}>
                {ptrState==="refreshing"?<span style={{fontSize:16}}>↻</span>:ptrState==="releasing"?<span style={{fontSize:16}}>↑</span>:<span style={{fontSize:16}}>↓</span>}
              </div>
              <span style={{fontSize:12,fontWeight:600,color:"#8E8E93"}}>{ptrState==="refreshing"?"Wird aktualisiert…":ptrState==="releasing"?"Loslassen":"Nach unten ziehen"}</span>
            </div>)}

            {tab==="dashboard"&&<DashboardTab players={players} sessions={sessions} absences={absences} setTab={setTab}/>}
            {tab==="kader"&&<KaderTab players={players} setPlayers={setPlayers} absences={absences} setAbsences={setAbsences} sessions={sessions}/>}
            {tab==="abwesenheiten"&&<AbwesenheitenTab absences={absences} setAbsences={setAbsences} players={players}/>}
            {tab==="einheiten"&&<EinheitenTab sessions={sessions} setSessions={setSessions} players={players} absences={absences}/>}
            {tab==="kalender"&&<KalenderTab players={players} sessions={sessions} absences={absences}/>}
            {tab==="taktik"&&<TaktikTab players={players} formations={formations} setFormations={setFormations} activeIdxRef={taktikIdxRef}/>}
            {tab==="statistik"&&<StatistikTab players={players} sessions={sessions} absences={absences}/>}
            {tab==="einstellungen"&&<EinstellungenTab saison={saison} setSaison={setSaison} players={players} sessions={sessions} absences={absences} setSessions={setSessions} setAbsences={setAbsences} setFormations={setFormations} allData={allData} restoreData={restoreData} ghConfig={ghConfig} saveGhConfig={saveGhConfig} loadFromGitHub={loadFromGitHub} ghEnabled={ghEnabled}/>}
          </div>

          {/* Bottom tab bar — mobile only */}
          {isMobile&&<div style={{background:"rgba(242,242,247,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(0,0,0,.08)",display:"grid",gridTemplateColumns:"repeat(6,1fr)",padding:"7px 0 11px",flexShrink:0}}>
            {TABS.map(t=>(<button key={t.key} onClick={()=>setTab(t.key)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"3px 0"}}>
              <div style={{fontSize:17,lineHeight:1,filter:tab===t.key?"none":"grayscale(1) opacity(.4)"}}>{t.icon}</div>
              <span style={{fontSize:8,fontWeight:600,color:tab===t.key?"#007AFF":"#8E8E93"}}>{t.label}</span>
              {tab===t.key&&<div style={{width:3,height:3,borderRadius:2,background:"#007AFF",marginTop:-1}}/>}
            </button>))}
          </div>}

        </div>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
