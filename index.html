<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
  <title>Mein Team ⚽</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F2F2F7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback, memo } = React;

    /* Storage shim: uses localStorage on GitHub Pages instead of Claude storage API */
    window.storage = {
      get: async (key) => {
        try { const v = localStorage.getItem(key); return v ? { value: v } : null; }
        catch(e) { return null; }
      },
      set: async (key, value) => {
        try { localStorage.setItem(key, value); return { value }; }
        catch(e) { return null; }
      }
    };


const TODAY = new Date().toISOString().split("T")[0];
const fmt  = d => d ? new Date(d+"T00:00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"}) : "";
const fmtD = d => d ? d.split("-").reverse().join(".") : "";
const age  = b => {
  if(!b)return 0;
  const today=new Date(TODAY),born=new Date(b);
  let a=today.getFullYear()-born.getFullYear();
  const m=today.getMonth()-born.getMonth();
  if(m<0||(m===0&&today.getDate()<born.getDate()))a--;
  return a;
};
const nextBd = b => {
  if(!b)return "";
  const [,bm,bd]=b.split("-").map(Number);
  const ty=+TODAY.slice(0,4);
  const thisYear=`${ty}-${String(bm).padStart(2,"0")}-${String(bd).padStart(2,"0")}`;
  if(thisYear>=TODAY)return thisYear;
  return `${ty+1}-${String(bm).padStart(2,"0")}-${String(bd).padStart(2,"0")}`;
};
const MONTHS=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const CATS=[{key:"Urlaub",color:"#34C759"},{key:"Krank",color:"#FF9500"},{key:"Verletzt",color:"#FF3B30"},{key:"Privat",color:"#AF52DE"}];
const catOf=k=>CATS.find(c=>c.key===k)||{color:"#8E8E93"};
const getAbs=(abs,pid,date)=>abs.find(a=>String(a.playerId)===String(pid)&&a.from<=date&&a.to>=date)||null;

const Badge=memo(({label,color})=><span style={{display:"inline-flex",alignItems:"center",background:color+"18",color,fontSize:11,fontWeight:600,padding:"2px 7px",borderRadius:20,whiteSpace:"nowrap"}}>{label}</span>);

const Card=memo(function Card({children,style,onClick}){
  return <div onClick={onClick}
    onMouseEnter={e=>{if(onClick)e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.1)";}}
    onMouseLeave={e=>{if(onClick)e.currentTarget.style.boxShadow="0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04)";}}
    style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04)",padding:"10px 14px",marginBottom:6,cursor:onClick?"pointer":"default",...style}}>{children}</div>;
});

const Empty=memo(({icon,text})=><div style={{textAlign:"center",padding:"48px 0"}}><div style={{fontSize:36,marginBottom:10}}>{icon}</div><div style={{color:"#8E8E93",fontSize:14}}>{text}</div></div>);

const Field=memo(({label,children})=><div style={{marginBottom:10}}><label style={{fontSize:11,fontWeight:600,color:"#6D6D72",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:4}}>{label}</label>{children}</div>);

const SecHdr=memo(function SecHdr({title,count,unit,onAdd}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
    <div><div style={{fontSize:26,fontWeight:800,color:"#1C1C1E"}}>{title}</div>{count!=null&&<div style={{fontSize:12,color:"#8E8E93",marginTop:2}}>{count} {unit}</div>}</div>
    {onAdd&&<button onClick={onAdd} style={{background:"#007AFF",color:"#fff",border:"none",borderRadius:50,width:34,height:34,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,122,255,.35)"}}>+</button>}
  </div>;
});

function Modal({title,onClose,children,center}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:center?"center":"flex-end",justifyContent:"center",zIndex:1000,backdropFilter:"blur(4px)",padding:center?"20px":0}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:"#F2F2F7",borderRadius:center?"20px":"22px 22px 0 0",width:"100%",maxWidth:600,maxHeight:"92vh",overflowY:"auto",paddingBottom:center?20:36,animation:"slideUp .22s cubic-bezier(.34,1.56,.64,1)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 18px 10px"}}>
        <span style={{fontSize:16,fontWeight:700,color:"#1C1C1E"}}>{title}</span>
        <button onClick={onClose} style={{background:"#E5E5EA",border:"none",borderRadius:50,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:"#3C3C43"}}>x</button>
      </div>
      <div style={{padding:"0 16px"}}>{children}</div>
    </div>
  </div>;
}

const TInput=memo(function TInput({value,onChange,type,placeholder}){
  return <input type={type||"text"} value={value} onChange={onChange} placeholder={placeholder}
    onFocus={e=>e.target.style.borderColor="#007AFF"} onBlur={e=>e.target.style.borderColor="#E5E5EA"}
    style={{width:"100%",background:"#fff",border:"1.5px solid #E5E5EA",borderRadius:12,padding:"10px 13px",fontSize:15,fontFamily:"inherit",color:"#1C1C1E",outline:"none",boxSizing:"border-box"}}/>;
});

const TSelect=memo(function TSelect({value,onChange,options}){
  return <select value={value} onChange={onChange} style={{width:"100%",background:"#fff",border:"1.5px solid #E5E5EA",borderRadius:12,padding:"10px 13px",fontSize:15,fontFamily:"inherit",color:"#1C1C1E",outline:"none",appearance:"none",boxSizing:"border-box"}}>
    {options.map(o=>{const v=typeof o==="object"?o.value:o,l=typeof o==="object"?o.label:o;return <option key={v} value={v}>{l}</option>;})}</select>;
});

const PriBtn=memo(function PriBtn({label,onClick,danger,disabled}){
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",background:danger?"#FF3B30":"#007AFF",color:"#fff",border:"none",borderRadius:12,padding:"12px",fontSize:15,fontWeight:600,fontFamily:"inherit",cursor:disabled?"default":"pointer",opacity:disabled?0.5:1}}>{label}</button>;
});

const SmBtn=memo(function SmBtn({label,color,onClick}){
  return <button onClick={onClick} style={{background:color+"15",color,border:"none",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0}}>{label}</button>;
});

// ── BirthdatePicker ────────────────────────────────────────────────────────
function BirthdatePicker({value,onChange}){
  const cy=new Date().getFullYear();
  const p=value?value.split("-"):null;
  const [open,setOpen]=useState(false);
  const [vy,setVy]=useState(p?+p[0]:cy-20);
  const [vm,setVm]=useState(p?+p[1]-1:0);
  const [pd,setPd]=useState(p?+p[2]:null);
  const dim=new Date(vy,vm+1,0).getDate();
  const fdow=(new Date(vy,vm,1).getDay()+6)%7;
  const years=Array.from({length:80},(_,i)=>cy-i);
  const open2=e=>{e.stopPropagation();const q=value?value.split("-"):null;setVy(q?+q[0]:cy-20);setVm(q?+q[1]-1:0);setPd(q?+q[2]:null);setOpen(true);};
  const prevM=()=>{setPd(null);if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1);};
  const nextM=()=>{setPd(null);if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1);};
  const confirm=()=>{if(!pd)return;onChange(vy+"-"+String(vm+1).padStart(2,"0")+"-"+String(pd).padStart(2,"0"));setOpen(false);};
  return <>
    <div onClick={open2} style={{background:"#fff",border:"1.5px solid #E5E5EA",borderRadius:12,padding:"10px 13px",fontSize:15,color:value?"#1C1C1E":"#C7C7CC",cursor:"pointer",userSelect:"none"}}>{value?fmtD(value):"Geburtsdatum wählen"}</div>
    {open&&<div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.4)",backdropFilter:"blur(3px)",padding:20}} onClick={e=>{e.stopPropagation();if(e.target===e.currentTarget)setOpen(false);}}>
      <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,.2)",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px",borderBottom:"1px solid #F2F2F7"}}>
          <button onClick={prevM} style={{background:"#F2F2F7",border:"none",borderRadius:8,width:32,height:32,fontSize:16,cursor:"pointer"}}>{"<"}</button>
          <div style={{display:"flex",gap:6}}>
            <select value={vm} onChange={e=>{setVm(+e.target.value);setPd(null);}} style={{border:"none",background:"transparent",fontSize:15,fontWeight:700,color:"#1C1C1E",fontFamily:"inherit",cursor:"pointer",outline:"none"}}>
              {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <select value={vy} onChange={e=>{setVy(+e.target.value);setPd(null);}} style={{border:"none",background:"transparent",fontSize:15,fontWeight:700,color:"#1C1C1E",fontFamily:"inherit",cursor:"pointer",outline:"none"}}>
              {years.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </div>
          <button onClick={nextM} style={{background:"#F2F2F7",border:"none",borderRadius:8,width:32,height:32,fontSize:16,cursor:"pointer"}}>{">"}</button>
        </div>
        <div style={{padding:"10px 12px 8px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
            {["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#8E8E93"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {Array.from({length:fdow}).map((_,i)=><div key={"e"+i}/>)}
            {Array.from({length:dim}).map((_,i)=>{
              const d=i+1,sel=d===pd;
              return <button key={d} onClick={()=>setPd(d)}
                onMouseEnter={e=>{if(!sel)e.currentTarget.style.background="#F2F2F7";}}
                onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}
                style={{aspectRatio:"1",borderRadius:50,border:"none",background:sel?"#007AFF":"transparent",color:sel?"#fff":"#1C1C1E",fontSize:14,fontWeight:sel?700:400,cursor:"pointer",fontFamily:"inherit"}}>{d}</button>;
            })}
          </div>
        </div>
        <div style={{borderTop:"1px solid #F2F2F7",padding:"10px 12px",display:"flex",gap:8}}>
          <button onClick={()=>setOpen(false)} style={{flex:1,background:"#F2F2F7",border:"none",borderRadius:12,padding:"11px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#3C3C43"}}>Abbrechen</button>
          <button onClick={confirm} disabled={!pd} style={{flex:1,background:pd?"#007AFF":"#E5E5EA",border:"none",borderRadius:12,padding:"11px",fontSize:14,fontWeight:600,cursor:pd?"pointer":"default",fontFamily:"inherit",color:pd?"#fff":"#8E8E93"}}>Übernehmen</button>
        </div>
      </div>
    </div>}
  </>;
}

// ── Position Picker ────────────────────────────────────────────────────────
// Zones: each is { key, label, color, x (field %), y (field %) for taktik default }
const POSITIONS=[
  {key:"Torwart",   label:"TW", fullLabel:"Torwart",   color:"#FF9500", zone:"GK",  tx:50, ty:88},
  {key:"Abwehr",    label:"AB", fullLabel:"Abwehr",     color:"#007AFF", zone:"DEF", tx:50, ty:72},
  {key:"Mittelfeld",label:"MF", fullLabel:"Mittelfeld", color:"#34C759", zone:"MID", tx:50, ty:52},
  {key:"Sturm",     label:"ST", fullLabel:"Sturm",      color:"#FF3B30", zone:"FWD", tx:50, ty:32},
];
const posOf=k=>POSITIONS.find(p=>p.key===k)||POSITIONS[3];

function PositionPicker({value,onChange}){
  const W="rgba(255,255,255,.6)",sw="0.7";
  const zones=[
    {key:"Sturm",    y:0,   h:25, label:"ST"},
    {key:"Mittelfeld",y:25, h:25, label:"MF"},
    {key:"Abwehr",   y:50, h:25, label:"AB"},
    {key:"Torwart",  y:75, h:25, label:"TW"},
  ];
  return (
    <div style={{position:"relative",width:"100%",borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.12)"}}>
      <svg viewBox="0 0 100 50" style={{display:"block",width:"100%"}} xmlns="http://www.w3.org/2000/svg">
        {/* Grass */}
        <rect width="100" height="50" fill="#2e8b50"/>
        {zones.map((z,i)=>(
          <rect key={z.key} x="0" y={z.y*0.5} width="100" height={z.h*0.5}
            fill={i%2===0?"#2e8b50":"#339958"}/>
        ))}
        {/* Field lines */}
        <rect x="5" y="2" width="90" height="46" fill="none" stroke={W} strokeWidth={sw}/>
        <line x1="5" y1="25" x2="95" y2="25" stroke={W} strokeWidth={sw}/>
        <circle cx="50" cy="25" r="7" fill="none" stroke={W} strokeWidth={sw}/>
      </svg>
      {/* Clickable zone overlays */}
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column"}}>
        {zones.map(z=>{
          const pos=posOf(z.key);
          const isActive=value===z.key;
          return (
            <div key={z.key} onClick={()=>onChange(z.key)}
              style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
                cursor:"pointer",background:isActive?pos.color+"50":"transparent",
                transition:"background .15s",borderBottom:z.key!=="Torwart"?"1px solid rgba(255,255,255,.15)":"none"}}>
              <div style={{
                background:isActive?pos.color:"rgba(0,0,0,.35)",
                color:"#fff",fontWeight:700,fontSize:13,
                padding:"4px 14px",borderRadius:20,
                boxShadow:isActive?"0 2px 8px rgba(0,0,0,.3)":"none",
                transition:"all .15s",
                border:isActive?"2px solid rgba(255,255,255,.6)":"2px solid transparent",
              }}>{pos.fullLabel}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


const KaderTab=memo(function KaderTab({players,setPlayers,absences,setAbsences,sessions}){
  const [modal,setModal]=useState(null);
  const [profile,setProfile]=useState(null);
  const [form,setForm]=useState({name:"",number:"",birthdate:"",position:"Sturm"});
  const [numWarn,setNumWarn]=useState("");
  const [posFilter,setPosFilter]=useState("Alle");
  const [absModal,setAbsModal]=useState(false);
  const [absForm,setAbsForm]=useState({category:"Urlaub",from:TODAY,to:"",note:""});
  const [injModal,setInjModal]=useState(false); // injury entry modal
  const [injForm,setInjForm]=useState({diagnosis:"",from:TODAY,to:"",returnDate:"",note:""});
  const [notesEdit,setNotesEdit]=useState(false); // editing notes inline
  const [notesVal,setNotesVal]=useState("");

  const POS_ORDER={"Torwart":0,"Abwehr":1,"Mittelfeld":2,"Sturm":3};
  const sortedAll=useMemo(()=>[...players].sort((a,b)=>{
    const pa=POS_ORDER[a.position||"Sturm"]??3;
    const pb=POS_ORDER[b.position||"Sturm"]??3;
    return pa!==pb?pa-pb:a.number-b.number;
  }),[players]);
  const sorted=useMemo(()=>posFilter==="Alle"?sortedAll:sortedAll.filter(p=>(p.position||"Sturm")===posFilter),[sortedAll,posFilter]);

  const openAdd=()=>{setForm({name:"",number:"",birthdate:"",position:"Sturm"});setNumWarn("");setModal("add");};
  const openEdit=p=>{setForm({name:p.name,number:String(p.number),birthdate:p.birthdate,position:p.position||"Sturm"});setNumWarn("");setModal(p);};
  const save=()=>{
    if(!form.name.trim()||!form.number)return;
    const num=+form.number;
    const duplicate=players.find(p=>p.number===num&&(modal==="add"||p.id!==modal.id));
    if(duplicate&&!numWarn){
      setNumWarn("Nummer "+num+" ist bereits vergeben ("+duplicate.name+"). Nochmal tippen zum Bestätigen.");
      return;
    }
    const existing=modal==="add"?null:players.find(p=>p.id===modal.id);
    const rec={
      id:modal==="add"?Date.now():modal.id,
      name:form.name,number:num,birthdate:form.birthdate,position:form.position,
      // preserve existing injuries and notes
      injuries:existing?.injuries||[],
      notes:existing?.notes||"",
    };
    setPlayers(prev=>modal==="add"?[...prev,rec]:prev.map(p=>p.id===modal.id?rec:p));
    setModal(null);setNumWarn("");
  };
  const del=id=>{setPlayers(prev=>prev.filter(p=>p.id!==id));setModal(null);setProfile(null);};

  // Add injury entry to player
  const saveInjury=()=>{
    if(!injForm.diagnosis.trim()||!injForm.from)return;
    const entry={id:Date.now(),...injForm};
    setPlayers(prev=>prev.map(p=>p.id===profile.id?{...p,injuries:[entry,...(p.injuries||[])]}:p));
    setProfile(prev=>({...prev,injuries:[entry,...(prev.injuries||[])]}));
    setInjModal(false);setInjForm({diagnosis:"",from:TODAY,to:"",returnDate:"",note:""});
  };
  const delInjury=injId=>{
    setPlayers(prev=>prev.map(p=>p.id===profile.id?{...p,injuries:(p.injuries||[]).filter(i=>i.id!==injId)}:p));
    setProfile(prev=>({...prev,injuries:(prev.injuries||[]).filter(i=>i.id!==injId)}));
  };

  // Save notes
  const saveNotes=()=>{
    setPlayers(prev=>prev.map(p=>p.id===profile.id?{...p,notes:notesVal}:p));
    setProfile(prev=>({...prev,notes:notesVal}));
    setNotesEdit(false);
  };

  const statsFor=pid=>{
    const past=sessions.filter(s=>s.date<=TODAY);
    const tr=past.filter(s=>s.type==="Training"),sp=past.filter(s=>s.type==="Spiel");
    const tP=tr.filter(s=>s.attendance&&s.attendance[pid]).length;
    const sP=sp.filter(s=>s.attendance&&s.attendance[pid]).length;
    const pAbs=absences.filter(a=>String(a.playerId)===String(pid));
    return {trLen:tr.length,spLen:sp.length,tP,sP,tPct:tr.length?Math.round(tP/tr.length*100):null,pAbs};
  };

  return <div>
    <SecHdr title="Kader" count={players.length} unit="Spieler" onAdd={openAdd}/>
    {/* Position filter */}
    <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
      {["Alle",...POSITIONS.map(p=>p.key)].map(pos=>{
        const posData=POSITIONS.find(p=>p.key===pos);
        const isActive=posFilter===pos;
        return <button key={pos} onClick={()=>setPosFilter(pos)} style={{
          whiteSpace:"nowrap",padding:"5px 12px",borderRadius:20,border:"none",
          background:isActive?(posData?posData.color:"#007AFF"):"#E5E5EA",
          color:isActive?"#fff":"#3C3C43",
          fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit",flexShrink:0,
        }}>{pos}</button>;
      })}
    </div>
    {sorted.length===0&&<Empty icon="👥" text="Noch keine Spieler angelegt"/>}
    {sorted.map(p=>{
      const ab=getAbs(absences,p.id,TODAY);
      return <Card key={p.id} onClick={()=>setProfile(p)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:13,fontWeight:700,color:"#007AFF",minWidth:22,textAlign:"right",flexShrink:0}}>{p.number}</span>
          {p.position&&<span style={{fontSize:10,fontWeight:700,color:"#fff",background:posOf(p.position).color,padding:"2px 6px",borderRadius:10,flexShrink:0}}>{posOf(p.position).label}</span>}
          <span style={{fontSize:14,color:"#1C1C1E",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {p.name} <span style={{color:"#8E8E93"}}>({age(p.birthdate)} Jahre)</span> {fmtD(p.birthdate)}
          </span>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            {ab&&<Badge label={ab.category} color={catOf(ab.category).color}/>}
            <SmBtn label="x" color="#FF3B30" onClick={e=>{e.stopPropagation();del(p.id);}}/>
          </div>
        </div>
      </Card>;
    })}

    {modal&&<Modal center title={modal==="add"?"Spieler hinzufügen":"Spieler bearbeiten"} onClose={()=>setModal(null)}>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Field label="Name"><TInput value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Max Mustermann"/></Field></div>
        <div style={{width:80}}><Field label="Nr."><TInput type="number" value={form.number} onChange={e=>{setForm(f=>({...f,number:e.target.value}));setNumWarn("");}} placeholder="10"/></Field></div>
      </div>
      <Field label="Position">
        <PositionPicker value={form.position} onChange={v=>setForm(f=>({...f,position:v}))}/>
      </Field>
      <Field label="Geburtsdatum"><BirthdatePicker value={form.birthdate} onChange={v=>setForm(f=>({...f,birthdate:v}))}/></Field>
      {numWarn&&<div style={{background:"#FF950015",border:"1.5px solid #FF950050",borderRadius:10,padding:"8px 12px",marginBottom:8,fontSize:12,fontWeight:600,color:"#B86000"}}>⚠️ {numWarn}</div>}
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <PriBtn label={numWarn?"Trotzdem speichern":"Speichern"} onClick={save}/>
        {modal!=="add"&&<PriBtn label="Loeschen" danger onClick={()=>del(modal.id)}/>}
      </div>
    </Modal>}

    {profile&&(()=>{
      const{trLen,spLen,tP,sP,tPct,pAbs}=statsFor(profile.id);
      const hue=(profile.name.charCodeAt(0)*37+(profile.name.charCodeAt(1)||0)*13)%360;
      const ab=getAbs(absences,profile.id,TODAY);
      const playerInjuries=(profile.injuries||[]).sort((a,b)=>b.from.localeCompare(a.from));
      const allAbsSorted=[...pAbs].sort((a,b)=>b.from.localeCompare(a.from));

      return <><Modal center title="Spielerprofil" onClose={()=>{setProfile(null);setNotesEdit(false);}}>
        {/* Header */}
        <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:16}}>
          <div style={{width:52,height:52,borderRadius:26,background:"hsl("+hue+",60%,88%)",color:"hsl("+hue+",60%,35%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,flexShrink:0}}>
            {profile.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:800,color:"#1C1C1E"}}>{profile.name}</div>
            <div style={{fontSize:12,color:"#8E8E93",marginTop:2}}>Nr. {profile.number} · {age(profile.birthdate)} J. · {fmtD(profile.birthdate)}</div>
            <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
              {profile.position&&<span style={{fontSize:11,fontWeight:700,color:"#fff",background:posOf(profile.position).color,padding:"2px 9px",borderRadius:10}}>{posOf(profile.position).fullLabel}</span>}
              {ab&&<Badge label={ab.category+" bis "+fmtD(ab.to)} color={catOf(ab.category).color}/>}
            </div>
          </div>
          <button onClick={()=>{setProfile(null);openEdit(profile);}} style={{background:"#007AFF15",color:"#007AFF",border:"none",borderRadius:10,padding:"6px 11px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Bearbeiten</button>
        </div>

        {/* Training & Spiele */}
        {[{title:"Training",v:tP+"/"+trLen,pct:tPct,c:"#007AFF"},{title:"Spiele",v:sP+"/"+spLen,pct:spLen?Math.round(sP/spLen*100):null,c:"#FF3B30"}].map(s=>(
          <div key={s.title} style={{background:"#F8F8F8",borderRadius:12,padding:"12px 13px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>{s.title}</div>
            {s.pct===null?<div style={{fontSize:13,color:"#C7C7CC"}}>Keine Daten</div>:<>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:"#6D6D72"}}>Teilnahmen</span>

              </div>
              <div style={{height:5,background:"#E5E5EA",borderRadius:3}}><div style={{height:"100%",width:s.pct+"%",background:s.c,borderRadius:3}}/></div>
              <div style={{fontSize:12,color:s.c,fontWeight:600,marginTop:3}}>{s.pct}%</div>
            </>}
          </div>
        ))}

        {/* ── Verletzungshistorie ── */}
        <div style={{background:"#F8F8F8",borderRadius:12,padding:"12px 13px",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:.5}}>Verletzungshistorie</div>
            <button onClick={()=>{setInjForm({diagnosis:"",from:TODAY,to:"",returnDate:"",note:""});setInjModal(true);}} style={{background:"#FF3B3015",color:"#FF3B30",border:"none",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>+ Eintrag</button>

          {playerInjuries.length===0
            ?<div style={{fontSize:13,color:"#C7C7CC"}}>Keine Verletzungen eingetragen</div>
            :<div style={{position:"relative",paddingLeft:18}}>
              <div style={{position:"absolute",left:6,top:4,bottom:4,width:2,background:"#FFE0E0",borderRadius:1}}/>
              {playerInjuries.map((inj,i)=>{
                const isActive=inj.from<=TODAY&&(inj.to?inj.to>=TODAY:true);
                const days=inj.from&&inj.to?Math.round((new Date(inj.to)-new Date(inj.from))/86400000)+1:null;
                return <div key={inj.id} style={{position:"relative",marginBottom:i<playerInjuries.length-1?12:0}}>
                  <div style={{position:"absolute",left:-15,top:3,width:10,height:10,borderRadius:5,background:isActive?"#FF3B30":"#FFB0B0",border:"2px solid #fff",boxShadow:"0 0 0 1px "+(isActive?"#FF3B30":"#FFB0B0")}}/>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#1C1C1E",display:"flex",alignItems:"center",gap:6}}>
                        {inj.diagnosis||"Verletzung"}
                        {isActive&&<Badge label="Aktiv" color="#FF3B30"/>}
                      </div>
                      <div style={{fontSize:11,color:"#8E8E93",marginTop:2}}>
                        {fmtD(inj.from)}{inj.to?" – "+fmtD(inj.to):""}
                        {inj.returnDate&&" · Rückkehr: "+fmtD(inj.returnDate)}
                      </div>
                      {inj.note&&<div style={{fontSize:11,color:"#8E8E93",marginTop:1,fontStyle:"italic"}}>{inj.note}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                      {days&&<span style={{fontSize:12,fontWeight:700,color:"#FF3B30"}}>{days}d</span>}
                      <button onClick={()=>delInjury(inj.id)} style={{background:"none",border:"none",color:"#C7C7CC",cursor:"pointer",fontSize:13,padding:"0 2px"}}>✕</button>
                    </div>
                  </div>
                </div>;
              })}
            </div>
          }
        </div>

        {/* ── Trainer-Notizen ── */}
        <div style={{background:"#F8F8F8",borderRadius:12,padding:"12px 13px",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:.5}}>Trainer-Notizen</div>
            {!notesEdit
              ?<button onClick={()=>{setNotesVal(profile.notes||"");setNotesEdit(true);}} style={{background:"#007AFF15",color:"#007AFF",border:"none",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Bearbeiten</button>
              :<div style={{display:"flex",gap:6}}>
                <button onClick={()=>setNotesEdit(false)} style={{background:"#E5E5EA",border:"none",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",color:"#3C3C43"}}>Abbrechen</button>
                <button onClick={saveNotes} style={{background:"#34C759",color:"#fff",border:"none",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Speichern</button>
              </div>
            }
          </div>
          {notesEdit
            ?<textarea
                value={notesVal}
                onChange={e=>setNotesVal(e.target.value)}
                placeholder="Notizen zum Spieler (Stärken, Schwächen, Besonderheiten...)"
                rows={4}
                style={{width:"100%",background:"#fff",border:"1.5px solid #007AFF",borderRadius:10,padding:"9px 11px",fontSize:13,fontFamily:"inherit",color:"#1C1C1E",resize:"vertical",outline:"none",boxSizing:"border-box"}}
              />
            :<div style={{fontSize:13,color:profile.notes?"#1C1C1E":"#C7C7CC",lineHeight:1.6,whiteSpace:"pre-wrap",minHeight:36}}>
                {profile.notes||"Noch keine Notizen eingetragen"}
              </div>
          }
        </div>

        {/* Alle Abwesenheiten */}
        <div style={{background:"#F8F8F8",borderRadius:12,padding:"12px 13px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Alle Abwesenheiten</div>
          {allAbsSorted.length===0
            ?<div style={{fontSize:13,color:"#C7C7CC"}}>Keine Abwesenheiten</div>
            :allAbsSorted.slice(0,6).map(a=>(
                <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                  <Badge label={a.category} color={catOf(a.category).color}/>
                  <span style={{fontSize:12,color:"#6D6D72",flex:1}}>{fmtD(a.from)} – {fmtD(a.to)}</span>
                  {a.note&&<span style={{fontSize:11,color:"#8E8E93",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.note}</span>}
                </div>
              ))
          }
          {allAbsSorted.length>6&&<div style={{fontSize:11,color:"#8E8E93",marginTop:4}}>+{allAbsSorted.length-6} weitere Einträge</div>}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button onClick={()=>{setAbsForm({category:"Urlaub",from:TODAY,to:"",note:""});setAbsModal(true);}} style={{flex:1,background:"#FF950015",color:"#FF9500",border:"1.5px solid #FF950030",borderRadius:12,padding:"11px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Abwesenheit</button>
          <PriBtn label="Löschen" danger onClick={()=>del(profile.id)}/>
        </div>
      </Modal>

      {/* Injury entry modal */}
      {injModal&&<Modal center title="Verletzung eintragen" onClose={()=>setInjModal(false)}>
        <Field label="Diagnose / Art der Verletzung">
          <TInput value={injForm.diagnosis} onChange={e=>setInjForm(f=>({...f,diagnosis:e.target.value}))} placeholder="z.B. Muskelfaserriss Wade"/>
        </Field>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><Field label="Verletzt seit"><TInput type="date" value={injForm.from} onChange={e=>setInjForm(f=>({...f,from:e.target.value}))}/></Field></div>
          <div style={{flex:1}}><Field label="Bis (optional)"><TInput type="date" value={injForm.to} onChange={e=>setInjForm(f=>({...f,to:e.target.value}))}/></Field></div>
        </div>
        <Field label="Voraussichtliche Rückkehr">
          <TInput type="date" value={injForm.returnDate} onChange={e=>setInjForm(f=>({...f,returnDate:e.target.value}))}/>
        </Field>
        <Field label="Notiz (optional)">
          <TInput value={injForm.note} onChange={e=>setInjForm(f=>({...f,note:e.target.value}))} placeholder="z.B. Physio 3x wöchentlich"/>
        </Field>
        <PriBtn label="Speichern" onClick={saveInjury} disabled={!injForm.diagnosis.trim()||!injForm.from}/>
      </Modal>}

      {/* Quick-add absence modal */}
      {absModal&&<Modal center title={"Abwesenheit – "+profile.name} onClose={()=>setAbsModal(false)}>
        <Field label="Kategorie">
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {CATS.map(c=><button key={c.key} onClick={()=>setAbsForm(f=>({...f,category:c.key}))} style={{padding:"7px 13px",borderRadius:20,border:"2px solid",borderColor:absForm.category===c.key?c.color:"#E5E5EA",background:absForm.category===c.key?c.color+"18":"#fff",color:absForm.category===c.key?c.color:"#3C3C43",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{c.key}</button>)}
          </div>
        </Field>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><Field label="Von"><TInput type="date" value={absForm.from} onChange={e=>setAbsForm(f=>({...f,from:e.target.value}))}/></Field></div>
          <div style={{flex:1}}><Field label="Bis"><TInput type="date" value={absForm.to} onChange={e=>setAbsForm(f=>({...f,to:e.target.value}))}/></Field></div>
        </div>
        <Field label="Notiz (optional)"><TInput value={absForm.note} onChange={e=>setAbsForm(f=>({...f,note:e.target.value}))} placeholder="z.B. Urlaub Mallorca"/></Field>
        <PriBtn label="Speichern" onClick={()=>{
          if(!absForm.from||!absForm.to)return;
          setAbsences(prev=>[...prev,{id:Date.now(),playerId:profile.id,category:absForm.category,from:absForm.from,to:absForm.to,note:absForm.note}]);
          setAbsModal(false);
        }}/>
      </Modal>}
    </>
    })()}
  </div>;
}
);

// ── ABWESENHEITEN ──────────────────────────────────────────────────────────
const AbwesenheitenTab=memo(function AbwesenheitenTab({absences,setAbsences,players}){
  const [modal,setModal]=useState(false); // false | "add" | absence-object
  const [filter,setFilter]=useState("Alle");
  const [form,setForm]=useState({playerId:"",category:"Urlaub",from:TODAY,to:"",note:""});

  const openAdd=()=>{
    setForm({playerId:players[0]?.id||"",category:"Urlaub",from:TODAY,to:"",note:""});
    setModal("add");
  };
  const openEdit=a=>{
    setForm({playerId:String(a.playerId),category:a.category,from:a.from,to:a.to,note:a.note||""});
    setModal(a);
  };
  const save=()=>{
    if(!form.playerId||!form.from||!form.to)return;
    if(modal==="add"){
      setAbsences(prev=>[...prev,{...form,id:Date.now(),playerId:+form.playerId}]);
    }else{
      setAbsences(prev=>prev.map(a=>a.id===modal.id?{...form,id:modal.id,playerId:+form.playerId}:a));
    }
    setModal(false);
  };
  const del=id=>{setAbsences(prev=>prev.filter(a=>a.id!==id));setModal(false);};
  const list=useMemo(()=>[...absences].filter(a=>filter==="Alle"||a.category===filter).sort((a,b)=>a.from.localeCompare(b.from)),[absences,filter]);

  const FormContent=()=><>
    <Field label="Spieler"><TSelect value={form.playerId} onChange={e=>setForm(f=>({...f,playerId:e.target.value}))} options={players.map(p=>({value:p.id,label:"#"+p.number+" "+p.name}))}/></Field>
    <Field label="Kategorie">
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {CATS.map(c=><button key={c.key} onClick={()=>setForm(f=>({...f,category:c.key}))} style={{padding:"7px 13px",borderRadius:20,border:"2px solid",borderColor:form.category===c.key?c.color:"#E5E5EA",background:form.category===c.key?c.color+"18":"#fff",color:form.category===c.key?c.color:"#3C3C43",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{c.key}</button>)}
      </div>
    </Field>
    <div style={{display:"flex",gap:10}}>
      <div style={{flex:1}}><Field label="Von"><TInput type="date" value={form.from} onChange={e=>setForm(f=>({...f,from:e.target.value}))}/></Field></div>
      <div style={{flex:1}}><Field label="Bis"><TInput type="date" value={form.to} onChange={e=>setForm(f=>({...f,to:e.target.value}))}/></Field></div>
    </div>
    <Field label="Notiz"><TInput value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Optional"/></Field>
    <div style={{display:"flex",gap:10}}>
      <PriBtn label="Speichern" onClick={save}/>
      {modal!=="add"&&<PriBtn label="Löschen" danger onClick={()=>del(modal.id)}/>}
    </div>
  </>;

  return <div>
    <SecHdr title="Abwesenheiten" count={absences.length} unit="Einträge" onAdd={openAdd}/>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
      {["Alle",...CATS.map(c=>c.key)].map(c=>(
        <button key={c} onClick={()=>setFilter(c)} style={{whiteSpace:"nowrap",padding:"5px 12px",borderRadius:20,border:"none",background:filter===c?"#007AFF":"#E5E5EA",color:filter===c?"#fff":"#3C3C43",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{c}</button>
      ))}
    </div>
    {list.length===0&&<Empty icon="📅" text="Keine Abwesenheiten"/>}
    {list.map(a=>{
      const pl=players.find(p=>p.id===+a.playerId||p.id===a.playerId);
      const cat=catOf(a.category);
      const active=a.from<=TODAY&&a.to>=TODAY;
      return <Card key={a.id} onClick={()=>openEdit(a)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#1C1C1E"}}>{pl?.name||"?"}</span>
              <Badge label={a.category} color={cat.color}/>
              {active&&<Badge label="Aktiv" color="#34C759"/>}
            </div>
            <div style={{fontSize:11,color:"#8E8E93",marginTop:1}}>{fmtD(a.from)} – {fmtD(a.to)}{a.note?" · "+a.note:""}</div>
          </div>
          <SmBtn label="x" color="#FF3B30" onClick={e=>{e.stopPropagation();del(a.id);}}/>
        </div>
      </Card>;
    })}
    {modal&&<Modal center title={modal==="add"?"Abwesenheit eintragen":"Abwesenheit bearbeiten"} onClose={()=>setModal(false)}>
      {players.length===0
        ?<div style={{textAlign:"center",color:"#8E8E93",padding:"20px 0"}}>Zuerst Spieler anlegen.</div>
        :<FormContent/>}
    </Modal>}
  </div>;
}
);

// ── EINHEITEN ──────────────────────────────────────────────────────────────
const EinheitenTab=memo(function EinheitenTab({sessions,setSessions,players,absences}){
  const [modal,setModal]=useState(null);
  const [attModal,setAtt]=useState(null);
  const emptyForm={type:"Training",date:TODAY,time:"18:00",note:"",opponent:"",homeAway:"Heim",result:"",intensity:"Mittel"};
  const [form,setForm]=useState(emptyForm);
  const preview=players.filter(p=>getAbs(absences,p.id,form.date));

  const INTENSITY=[
    {key:"Leicht", color:"#34C759", emoji:"🟢"},
    {key:"Mittel", color:"#FF9500", emoji:"🟡"},
    {key:"Hart",   color:"#FF3B30", emoji:"🔴"},
  ];
  const intOf=k=>INTENSITY.find(i=>i.key===k)||INTENSITY[1];

  const openAdd=()=>{setForm(emptyForm);setModal("add");};
  const openEdit=s=>{setForm({type:s.type,date:s.date,time:s.time,note:s.note||"",opponent:s.opponent||"",homeAway:s.homeAway||"Heim",result:s.result||"",intensity:s.intensity||"Mittel"});setModal(s);};

  const save=()=>{
    if(modal==="add"){
      const att={},reasons={};
      players.forEach(p=>{const ab=getAbs(absences,p.id,form.date);att[p.id]=false;if(ab)reasons[p.id]=ab.category;});
      setSessions(prev=>[{id:Date.now(),type:form.type,date:form.date,time:form.time,note:form.note,opponent:form.opponent,homeAway:form.homeAway,result:form.result,intensity:form.type==="Training"?form.intensity:undefined,attendance:att,absenceReasons:reasons},...prev]);
    }else{
      setSessions(prev=>prev.map(s=>s.id!==modal.id?s:{...s,type:form.type,date:form.date,time:form.time,note:form.note,opponent:form.opponent,homeAway:form.homeAway,result:form.result,intensity:form.type==="Training"?form.intensity:undefined}));
    }
    setModal(null);
  };
  const del=id=>{setSessions(prev=>prev.filter(s=>s.id!==id));setModal(null);};
  const toggleAtt=(sid,pid,cur)=>{
    setSessions(prev=>prev.map(s=>s.id!==sid?s:{...s,attendance:{...s.attendance,[pid]:!cur}}));
    setAtt(prev=>({...prev,attendance:{...prev.attendance,[pid]:!cur}}));
  };
  const setReason=(sid,pid,reason)=>{
    setSessions(prev=>prev.map(s=>s.id!==sid?s:{...s,absenceReasons:{...s.absenceReasons,[pid]:reason||undefined}}));
    setAtt(prev=>({...prev,absenceReasons:{...prev.absenceReasons,[pid]:reason||undefined}}));
  };
  const list=useMemo(()=>[...sessions].sort((a,b)=>b.date.localeCompare(a.date)),[sessions]);

  return <div>
    <SecHdr title="Einheiten" count={sessions.length} unit="Einträge" onAdd={openAdd}/>
    {list.length===0&&<Empty icon="📋" text="Noch keine Einheiten angelegt"/>}
    {list.map(s=>{
      const isSp=s.type==="Spiel",total=players.length;
      const present=Object.values(s.attendance||{}).filter(Boolean).length;
      const titleLine=isSp&&s.opponent?s.opponent+(s.homeAway?" ("+s.homeAway+")":""):s.type;
      const subLine=isSp&&s.result?<span style={{fontWeight:700,color:"#1C1C1E"}}>{s.result}</span>:s.note?<span style={{color:"#8E8E93"}}>{s.note}</span>:null;
      const inten=!isSp&&s.intensity?intOf(s.intensity):null;
      return <Card key={s.id} onClick={()=>openEdit(s)}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{width:34,height:34,borderRadius:10,background:(isSp?"#FF3B30":"#007AFF")+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{isSp?"⚽":"🏃"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1C1C1E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
              {titleLine}{!isSp&&s.note?<span style={{fontWeight:400,color:"#8E8E93",fontSize:13}}> · {s.note}</span>:""}
              {inten&&<span style={{display:"inline-flex",alignItems:"center",gap:3,background:inten.color+"18",color:inten.color,fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,flexShrink:0}}>{inten.key}</span>}
            </div>
            <div style={{fontSize:11,color:"#8E8E93",marginTop:1,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span>{fmt(s.date)} {s.time} Uhr</span>
              {subLine}
              {s.date<=TODAY&&total>0&&<span style={{display:"flex",alignItems:"center",gap:2}}>
                {players.map(p=>{
                  const r=(s.absenceReasons||{})[p.id],ab=getAbs(absences,p.id,s.date);
                  const dot=s.attendance[p.id]?"#34C759":r?catOf(r).color:ab?catOf(ab.category).color:"#E5E5EA";
                  return <div key={p.id} title={p.name} style={{width:8,height:8,borderRadius:4,background:dot,flexShrink:0}}/>;
                })}
                <span style={{color:"#34C759",fontWeight:600,marginLeft:2}}>{present}/{total}</span>
              </span>}
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <SmBtn label="Anwesenheit" color="#007AFF" onClick={e=>{e.stopPropagation();setAtt(s);}}/>
            <SmBtn label="x" color="#FF3B30" onClick={e=>{e.stopPropagation();del(s.id);}}/>
          </div>
        </div>
      </Card>;
    })}

    {modal&&<Modal center title={modal==="add"?"Einheit hinzufügen":"Einheit bearbeiten"} onClose={()=>setModal(null)}>
      <Field label="Typ">
        <div style={{display:"flex",gap:8}}>

        <Field label="Heim / Auswärts">

          </div>
        </Field>
        <Field label="Ergebnis (optional)"><TInput value={form.result} onChange={e=>setForm(f=>({...f,result:e.target.value}))} placeholder="z.B. 3:1"/></Field>

        <Field label="Intensität">
          <div style={{display:"flex",gap:8}}>

              <span style={{width:8,height:8,borderRadius:4,background:form.intensity===i.key?i.color:"#C7C7CC",display:"inline-block"}}/>
              {i.key}

        <Field label="Notiz (optional)"><TInput value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="z.B. Schwerpunkt Pressing"/></Field>
      </>}
      {preview.length>0&&<div style={{background:"#FF950012",border:"1.5px solid #FF950040",borderRadius:12,padding:"11px 13px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"#B86000",marginBottom:6}}>{preview.length} Spieler mit Abwesenheit</div>
        {preview.map(p=>{const ab=getAbs(absences,p.id,form.date);return <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:13,color:"#1C1C1E",flex:1}}>{p.name}</span><Badge label={ab.category} color={catOf(ab.category).color}/></div>;})}
      </div>}
      <div style={{display:"flex",gap:10}}>
        <PriBtn label="Speichern" onClick={save}/>
        {modal!=="add"&&<PriBtn label="Löschen" danger onClick={()=>del(modal.id)}/>}

    {attModal&&<Modal center title={attModal.type+" "+fmt(attModal.date)} onClose={()=>setAtt(null)}>
      <div style={{fontSize:13,color:"#8E8E93",marginBottom:12}}>{attModal.time} Uhr</div>
      {players.length===0&&<Empty icon="👥" text="Keine Spieler"/>}

        const present=attModal.attendance[p.id];

              {!present&&<select value={reason} onChange={e=>setReason(attModal.id,p.id,e.target.value)} style={{marginTop:4,background:reason?catOf(reason).color+"12":"#F2F2F7",border:"1.5px solid "+(reason?catOf(reason).color+"50":"#E5E5EA"),borderRadius:8,padding:"3px 8px",fontSize:12,fontFamily:"inherit",color:reason?catOf(reason).color:"#8E8E93",fontWeight:600,cursor:"pointer",outline:"none"}}>
                <option value="">Kein Grund</option>
                {CATS.map(c=><option key={c.key} value={c.key}>{c.key}</option>)}

            <button onClick={()=>toggleAtt(attModal.id,p.id,present)} style={{width:32,height:32,borderRadius:16,border:"2px solid",borderColor:present?"#34C759":cat?cat.color:"#E5E5EA",background:present?"#34C759":cat?cat.color+"20":"#fff",color:present?"#fff":cat?cat.color:"#8E8E93",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{present?"v":"o"}</button>

        </Card>;
      })}
    </Modal>}
  </div>;
}
);

// ── KALENDER ───────────────────────────────────────────────────────────────
const KalenderTab=memo(function KalenderTab({players,sessions,absences}){
  const now=new Date();
  const [view,setView]=useState("month");
  const [vm,setVm]=useState({year:now.getFullYear(),month:now.getMonth()});
  const [icsModal,setIcsModal]=useState(false);
  const [icsText,setIcsText]=useState("");
  const [icsCopied,setIcsCopied]=useState(false);

  // Week navigation: track Monday of displayed week
  const [weekStart,setWeekStart]=useState(()=>{
    const d=new Date();
    const dow=(d.getDay()+6)%7; // Mon=0
    d.setDate(d.getDate()-dow);
    return d.toISOString().split("T")[0];
  });

  const dim=new Date(vm.year,vm.month+1,0).getDate();
  const fdow=(new Date(vm.year,vm.month,1).getDay()+6)%7;
  const ds=useCallback(d=>vm.year+"-"+String(vm.month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"),[vm.year,vm.month]);

  // Week days array from weekStart
  const weekDays=useMemo(()=>{
    return Array.from({length:7},(_,i)=>{
      const d=new Date(weekStart+"T00:00:00");
      d.setDate(d.getDate()+i);
      return d.toISOString().split("T")[0];
    });
  },[weekStart]);

  const prevWeek=()=>{const d=new Date(weekStart+"T00:00:00");d.setDate(d.getDate()-7);setWeekStart(d.toISOString().split("T")[0]);};
  const nextWeek=()=>{const d=new Date(weekStart+"T00:00:00");d.setDate(d.getDate()+7);setWeekStart(d.toISOString().split("T")[0]);};

  const eventsForDate=useCallback(date=>{
    const ev=[];
    sessions.forEach(s=>{if(s.date===date)ev.push({type:s.type==="Spiel"?"spiel":"training",label:s.type==="Spiel"&&s.opponent?s.opponent:s.type,session:s});});
    players.forEach(p=>{
      if(!p.birthdate)return;
      if(date.slice(5)===p.birthdate.slice(5)){
        // Age they will be turning on this birthday
        const turningAge=+date.slice(0,4)-+p.birthdate.slice(0,4);
        ev.push({type:"birthday",label:p.name.split(" ")[0],age:turningAge});
      }
    });
    absences.forEach(a=>{void a;}); // absences not shown in calendar
    return ev;
  },[sessions,players,absences]);

  const eventsForDay=useCallback(d=>eventsForDate(ds(d)),[ds,eventsForDate]);
  const ec=e=>e.type==="training"?"#007AFF":e.type==="spiel"?"#FF3B30":e.type==="birthday"?"#FF9500":e.color||"#AF52DE";

  const allEv=useMemo(()=>{const r=[];for(let d=1;d<=dim;d++){const ev=eventsForDay(d);if(ev.length)r.push({date:ds(d),d,ev});}return r;},[dim,eventsForDay,ds]);

  // ICS export
  const exportIcs=()=>{
    const esc=s=>s.replace(/[,;\\]/g,"\\$&").replace(/\n/g,"\\n");
    const icsDate=d=>d.replace(/-/g,"");
    const uid=()=>Math.random().toString(36).slice(2)+Date.now();
    let lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Mein Team//DE","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
    sessions.forEach(s=>{
      const title=s.type==="Spiel"&&s.opponent?s.type+" vs "+s.opponent:s.type;
      const desc=s.result?"Ergebnis: "+s.result:s.note||"";
      lines.push("BEGIN:VEVENT","UID:"+uid()+"@meinteam",
        "DTSTART:"+icsDate(s.date)+(s.time?"T"+s.time.replace(":","")+"00":""),
        "SUMMARY:"+esc(title),
        desc?"DESCRIPTION:"+esc(desc):"",
        "END:VEVENT");
    });
    players.forEach(p=>{
      if(!p.birthdate)return;
      const bd=nextBd(p.birthdate);
      lines.push("BEGIN:VEVENT","UID:bd-"+p.id+"@meinteam",
        "DTSTART;VALUE=DATE:"+icsDate(bd),
        "RRULE:FREQ=YEARLY",
        "SUMMARY:Geburtstag "+esc(p.name),
        "END:VEVENT");
    });
    lines.push("END:VCALENDAR");
    const ics=lines.filter(Boolean).join("\r\n");
    // Try direct download first
    try {
      const a=document.createElement("a");
      a.href="data:application/octet-stream;charset=utf-8,"+encodeURIComponent(ics);
      a.download="meinteam.ics";
      a.click();
    } catch(e){}
    // Always show modal as fallback so content is accessible
    setIcsText(ics);
    setIcsCopied(false);
    setIcsModal(true);
  };

  const DAY_SHORT=["Mo","Di","Mi","Do","Fr","Sa","So"];

  return <div>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:26,fontWeight:800,color:"#1C1C1E"}}>Kalender</div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {/* View toggle */}
        <div style={{display:"flex",background:"#E5E5EA",borderRadius:9,padding:2,gap:1}}>
          {["month","week"].map(v=><button key={v} onClick={()=>setView(v)} style={{background:view===v?"#fff":"transparent",border:"none",borderRadius:7,padding:"4px 10px",fontSize:11,fontWeight:700,color:view===v?"#1C1C1E":"#8E8E93",cursor:"pointer",fontFamily:"inherit"}}>{v==="month"?"Monat":"Woche"}</button>)}
        </div>
        {/* ICS export */}
        <button onClick={exportIcs} title="Als .ics exportieren" style={{background:"#007AFF15",color:"#007AFF",border:"none",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer"}}>⬇</button>
      </div>
    </div>

    {/* ── MONTH VIEW ── */}
    {view==="month"&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button onClick={()=>setVm(v=>{let m=v.month-1,y=v.year;if(m<0){m=11;y--;}return{year:y,month:m};})} style={{background:"#E5E5EA",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:15}}>{"<"}</button>
        <span style={{fontSize:13,fontWeight:700,color:"#1C1C1E"}}>{MONTHS[vm.month]} {vm.year}</span>
        <button onClick={()=>setVm(v=>{let m=v.month+1,y=v.year;if(m>11){m=0;y++;}return{year:y,month:m};})} style={{background:"#E5E5EA",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:15}}>{">"}</button>
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:"8px 8px 6px",boxShadow:"0 1px 3px rgba(0,0,0,.06)",marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:2}}>
          {DAY_SHORT.map(d=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:"#8E8E93"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",rowGap:1,columnGap:1}}>
          {Array.from({length:fdow}).map((_,i)=><div key={"e"+i} style={{height:26}}/>)}
          {Array.from({length:dim}).map((_,i)=>{
            const d=i+1,date=ds(d),isT=date===TODAY,ev=eventsForDay(d);
            return <div key={d} style={{height:26,borderRadius:5,background:isT?"#007AFF":"transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:10,fontWeight:isT?700:400,color:isT?"#fff":"#1C1C1E",lineHeight:1}}>{d}</span>
              <div style={{display:"flex",gap:1,marginTop:1}}>{ev.slice(0,3).map((e,i)=><div key={i} style={{width:3,height:3,borderRadius:2,background:isT?"rgba(255,255,255,.8)":ec(e)}}/>)}</div>
            </div>;
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        {[["#007AFF","Training"],["#FF3B30","Spiel"],["#FF9500","Geburtstag"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:4,background:c}}/><span style={{fontSize:11,color:"#8E8E93"}}>{l}</span></div>
        ))}
      </div>
      <div style={{fontSize:14,fontWeight:700,color:"#1C1C1E",marginBottom:8}}>Termine – {MONTHS[vm.month]}</div>
      {allEv.length===0&&<Empty icon="🗓️" text="Keine Termine"/>}
      {allEv.map(({date,d,ev})=>(
        <Card key={date}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:36,height:36,borderRadius:9,flexShrink:0,background:date===TODAY?"#007AFF":"#F2F2F7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:14,fontWeight:800,color:date===TODAY?"#fff":"#1C1C1E",lineHeight:1}}>{d}</span>
              <span style={{fontSize:9,color:date===TODAY?"rgba(255,255,255,.7)":"#8E8E93",lineHeight:1.4}}>{MONTHS[vm.month].slice(0,3)}</span>
            </div>
            <div style={{flex:1}}>
              {ev.map((e,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                  <div style={{width:7,height:7,borderRadius:4,background:ec(e),flexShrink:0}}/>
                  <span style={{fontSize:13,color:"#1C1C1E"}}>{e.type==="birthday"?"🎂 "+e.label+(e.age?" ("+e.age+" J.)":""):e.label}</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
      ))}
    </>}

    {/* ── WEEK VIEW ── */}
    {view==="week"&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button onClick={prevWeek} style={{background:"#E5E5EA",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:15}}>{"<"}</button>
        <span style={{fontSize:12,fontWeight:700,color:"#1C1C1E"}}>{fmtD(weekStart).slice(0,5)} – {fmtD(weekDays[6]).slice(0,5)}</span>
        <button onClick={nextWeek} style={{background:"#E5E5EA",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:15}}>{">"}</button>
      </div>

      {/* Day columns */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:14}}>
        {weekDays.map((date,i)=>{
          const d=+date.slice(8);
          const isT=date===TODAY;
          const ev=eventsForDate(date);
          return <div key={date}>
            {/* Day header */}
            <div style={{textAlign:"center",marginBottom:4}}>
              <div style={{fontSize:9,fontWeight:700,color:"#8E8E93"}}>{DAY_SHORT[i]}</div>
              <div style={{width:24,height:24,borderRadius:12,background:isT?"#007AFF":"transparent",display:"flex",alignItems:"center",justifyContent:"center",margin:"2px auto 0"}}>
                <span style={{fontSize:12,fontWeight:isT?700:400,color:isT?"#fff":"#1C1C1E"}}>{d}</span>
              </div>
            </div>
            {/* Events */}
            {ev.map((e,ei)=>(
              <div key={ei} style={{background:ec(e)+"20",borderLeft:"2px solid "+ec(e),borderRadius:4,padding:"2px 4px",marginBottom:2,fontSize:9,fontWeight:600,color:ec(e),lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {e.type==="birthday"?"🎂":""}{e.label}
              </div>
            ))}
          </div>;
        })}
      </div>

      {/* Detailed list for this week */}
      <div style={{fontSize:14,fontWeight:700,color:"#1C1C1E",marginBottom:8}}>Diese Woche</div>
      {weekDays.every(date=>eventsForDate(date).length===0)&&<Empty icon="🗓️" text="Keine Termine diese Woche"/>}
      {weekDays.map(date=>{
        const ev=eventsForDate(date);
        if(!ev.length)return null;
        const d=+date.slice(8),mo=+date.slice(5,7)-1;
        return <Card key={date}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:36,height:36,borderRadius:9,flexShrink:0,background:date===TODAY?"#007AFF":"#F2F2F7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:14,fontWeight:800,color:date===TODAY?"#fff":"#1C1C1E",lineHeight:1}}>{d}</span>
              <span style={{fontSize:9,color:date===TODAY?"rgba(255,255,255,.7)":"#8E8E93",lineHeight:1.4}}>{MONTHS[mo].slice(0,3)}</span>
            </div>
            <div style={{flex:1}}>
              {ev.map((e,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                  <div style={{width:7,height:7,borderRadius:4,background:ec(e),flexShrink:0}}/>
                  <span style={{fontSize:13,color:"#1C1C1E"}}>{e.type==="birthday"?"🎂 "+e.label+(e.age?" ("+e.age+" J.)":""):e.label}</span>
                  {e.session?.time&&<span style={{fontSize:11,color:"#8E8E93",marginLeft:"auto"}}>{e.session.time} Uhr</span>}
                </div>
              ))}
            </div>
          </div>
        </Card>;
      })}
    </>}

    {/* ICS export modal */}
    {icsModal&&<Modal center title="Kalender exportieren" onClose={()=>setIcsModal(false)}>
      <div style={{fontSize:13,color:"#6D6D72",marginBottom:12,lineHeight:1.5}}>
        Kopiere den Inhalt, füge ihn in einen Texteditor ein, speichere die Datei als <strong>meinteam.ics</strong> und öffne sie in Apple Kalender oder Google Kalender.
      </div>
      <textarea readOnly value={icsText} rows={8} style={{width:"100%",background:"#F8F8F8",border:"1.5px solid #E5E5EA",borderRadius:10,padding:"9px 12px",fontSize:11,fontFamily:"monospace",color:"#3C3C43",resize:"none",outline:"none",boxSizing:"border-box"}}/>
      <div style={{marginTop:10}}>
        <button onClick={async()=>{
          try{await navigator.clipboard.writeText(icsText);}
          catch{const ta=document.createElement("textarea");ta.value=icsText;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
          setIcsCopied(true);setTimeout(()=>setIcsCopied(false),2000);
        }} style={{width:"100%",background:icsCopied?"#34C759":"#007AFF",color:"#fff",border:"none",borderRadius:12,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          {icsCopied?"✓ Kopiert!":"Inhalt kopieren"}
        </button>
      </div>
    </Modal>}
  </div>;
});


// ── TAKTIK ─────────────────────────────────────────────────────────────────
const TaktikTab=memo(function TaktikTab({players,formations,setFormations,activeIdxRef}){
  const [activeIdx,setActiveIdxState]=useState(activeIdxRef.current||0);
  const setActiveIdx=i=>{activeIdxRef.current=i;setActiveIdxState(i);};
  const [showModal,setMod]=useState(null);
  const [selected,setSel]=useState([]);
  const [nameModal,setNameModal]=useState(false);
  const [newName,setNewName]=useState("");
  const [showNames,setShowNames]=useState(true);
  const [drawMode,setDrawMode]=useState(false);
  const [aiAnalysis,setAiAnalysis]=useState(null);
  const fieldRef=useRef(null);
  const dragState=useRef(null);
  const drawState=useRef(null);

  const fmts=formations.length>0?formations:[{id:1,name:"Formation 1",players:[]}];
  const idx=Math.min(activeIdx,fmts.length-1);
  const fp=fmts[idx]?.players||[];
  const arrows=fmts[idx]?.arrows||[];
  const fpRef=useRef(fp);
  useEffect(()=>{fpRef.current=fp;},[fp]);

  // Persist arrows inside the current formation
  const setArrows=updater=>setFormations(prev=>{
    const arr=prev.length>0?prev:[{id:1,name:"Formation 1",players:[],arrows:[]}];
    const i=Math.min(activeIdx,arr.length-1);
    const cur=arr[i].arrows||[];
    const next=typeof updater==="function"?updater(cur):updater;
    return arr.map((f,fi)=>fi===i?{...f,arrows:next}:f);
  });

  const setFp=(updater,stdKey,stdNext)=>setFormations(prev=>{
    const arr=prev.length>0?prev:[{id:1,name:"Formation 1",players:[]}];
    const i=Math.min(activeIdx,arr.length-1);
    if(stdKey!==undefined){
      return arr.map((f,fi)=>fi===i?{...f,stdPlayers:{...(f.stdPlayers||{}),[stdKey]:stdNext}}:f);
    }
    const newPlayers=typeof updater==="function"?updater(arr[i].players):updater;
    return arr.map((f,fi)=>fi===i?{...f,players:newPlayers}:f);
  });

  const addFormation=()=>{
    if(!newName.trim())return;
    const nf={id:Date.now(),name:newName.trim(),players:[]};
    setFormations(prev=>[...(prev.length>0?prev:[{id:1,name:"Formation 1",players:[]}]),nf]);
    setActiveIdx(fmts.length);setNewName("");setNameModal(false);
  };
  const delFormation=i=>{
    if(fmts.length<=1)return;
    setFormations(prev=>prev.filter((_,fi)=>fi!==i));
    setActiveIdx(Math.max(0,idx-1));
  };

  const teamOn=fp.filter(p=>p.team==="team"),oppOn=fp.filter(p=>p.team==="opponent");
  const teamIds=new Set(teamOn.map(p=>p.id)),oppLabels=new Set(oppOn.map(p=>p.label));

  const addPlayers=()=>{
    if(showModal==="team"){
      const toAdd=selected.filter(id=>!teamIds.has(id));
      setFp(prev=>{
        const others=prev.filter(p=>p.team!=="team");
        const staying=prev.filter(p=>p.team==="team"&&selected.includes(p.id));
        const posCounts={};
        const newOnes=toAdd.map((id)=>{
          const pl=players.find(p=>p.id===id);
          const pos=posOf(pl?.position||"Sturm");
          const cnt=posCounts[pos.key]||0;
          posCounts[pos.key]=(cnt+1);
          const offsets=[-30,-15,0,15,30];
          const tx=50+(offsets[cnt]||cnt*15-30);
          return {uid:Date.now()+Math.random(),id,team:"team",label:pl?String(pl.number):"?",name:pl?pl.name:"?",x:Math.min(95,Math.max(5,tx)),y:pos.ty};
        });
        return [...others,...staying,...newOnes];
      });
    }else{
      const toAdd=selected.filter(l=>!oppLabels.has(l));
      setFp(prev=>{
        const others=prev.filter(p=>p.team!=="opponent");
        const staying=prev.filter(p=>p.team==="opponent"&&selected.includes(p.label));
        const newOnes=toAdd.map((label,i)=>({uid:Date.now()+1000+i,id:null,team:"opponent",label,name:"Gegner "+label,x:20+(i%5)*15,y:58+Math.floor(i/5)*15}));
        return [...others,...staying,...newOnes];
      });
    }
    setSel([]);setMod(null);
  };

  // ── Native drag + double-tap + arrow drawing ──────────────────────────────
  useEffect(()=>{
    const field=fieldRef.current;if(!field)return;
    const lastTap={};
    const gc=e=>e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
    const toFieldPct=(cx,cy)=>{
      const r=field.getBoundingClientRect();
      return {x:Math.min(97,Math.max(3,((cx-r.left)/r.width)*100)),y:Math.min(97,Math.max(3,((cy-r.top)/r.height)*100))};
    };
    const getUid=e=>{const el=e.target.closest("[data-uid]");return el?+el.dataset.uid:null;};

    const onDown=e=>{
      const uid=getUid(e);
      const{x:cx,y:cy}=gc(e);

      if(drawMode){
        // Start drawing an arrow from this point
        e.preventDefault();
        const{x,y}=toFieldPct(cx,cy);
        drawState.current={x1:x,y1:y,x2:x,y2:y,id:Date.now()};
        // Add a temporary arrow
        setArrows(prev=>[...prev,{id:drawState.current.id,x1:x,y1:y,x2:x,y2:y,temp:true}]);
        return;
      }

      if(uid==null)return;
      e.preventDefault();
      const now=Date.now();
      if(lastTap[uid]&&now-lastTap[uid]<350){
        setFp(prev=>prev.filter(p=>p.uid!==uid));lastTap[uid]=0;dragState.current=null;return;
      }
      lastTap[uid]=now;
      const r=field.getBoundingClientRect();
      const cur=fpRef.current.find(p=>p.uid===uid);if(!cur)return;
      dragState.current={uid,scx:cx,scy:cy,ox:cur.x,oy:cur.y,rect:r};
    };

    const onMove=e=>{
      const{x:cx,y:cy}=gc(e);

      if(drawMode&&drawState.current){
        e.preventDefault();
        const{x,y}=toFieldPct(cx,cy);
        const id=drawState.current.id;
        drawState.current.x2=x;drawState.current.y2=y;
        setArrows(prev=>prev.map(a=>a.id===id?{...a,x2:x,y2:y}:a));
        return;
      }

      if(!dragState.current)return;e.preventDefault();
      const{uid,scx,scy,ox,oy,rect}=dragState.current;
      const x=Math.min(97,Math.max(3,ox+((cx-scx)/rect.width)*100));
      const y=Math.min(97,Math.max(3,oy+((cy-scy)/rect.height)*100));
      setFp(prev=>prev.map(p=>p.uid===uid?{...p,x,y}:p));
    };

    const onUp=()=>{
      if(drawMode&&drawState.current){
        const ds=drawState.current;
        drawState.current=null;
        const dist=Math.sqrt((ds.x2-ds.x1)**2+(ds.y2-ds.y1)**2);
        if(dist<3)setArrows(prev=>prev.filter(a=>a.id!==ds.id));
        else setArrows(prev=>prev.map(a=>a.id===ds.id?{...a,temp:false}:a));
        return;
      }
      dragState.current=null;
    };

    const opts={passive:false};
    field.addEventListener("touchstart",onDown,opts);field.addEventListener("touchmove",onMove,opts);field.addEventListener("touchend",onUp,opts);
    field.addEventListener("mousedown",onDown,opts);window.addEventListener("mousemove",onMove,opts);window.addEventListener("mouseup",onUp,opts);
    return()=>{
      field.removeEventListener("touchstart",onDown,opts);field.removeEventListener("touchmove",onMove,opts);field.removeEventListener("touchend",onUp,opts);
      field.removeEventListener("mousedown",onDown,opts);window.removeEventListener("mousemove",onMove,opts);window.removeEventListener("mouseup",onUp,opts);
    };
  },[drawMode]);

  // ── Export as image ────────────────────────────────────────────────────────
  const exportImage=()=>{
    const field=fieldRef.current;if(!field)return;
    import("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js").catch(()=>{}).then(()=>{

        window.html2canvas(field,{useCORS:true,scale:2}).then(canvas=>{
          const a=document.createElement("a");

  const analyzeFormation=async()=>{

    // Classify for context
    const def=team.filter(p=>p.y<35);

    const teamDesc=team.map(p=>`${p.name} (Nr.${p.label}, x=${Math.round(p.x)}, y=${Math.round(p.y)})`).join(", ");
    const oppDesc=opp.length?opp.map(p=>`Nr.${p.label} (x=${Math.round(p.x)}, y=${Math.round(p.y)})`).join(", "):"keine";

    const prompt=`Du bist ein erfahrener Fussball-Taktikexperte. Analysiere diese Aufstellung auf Deutsch.

Formation: "${fmts[idx]?.name||"Unbenannt"}" (erkannt: ${fStr})
Koordinatensystem: x=0 links, x=100 rechts, y=0 eigenes Tor, y=100 gegnerisches Tor.

Eigene Spieler (${team.length}): ${teamDesc}
Gegner (${opp.length}): ${oppDesc}

Analysiere in ca. 200 Woertern:
1. Formation und Struktur
2. Staerken der Aufstellung
3. Schwachstellen und Risiken
4. Zwei konkrete Verbesserungsvorschlaege

Antworte strukturiert mit Abschnitten.`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6",

        <rect x="3" y="3" width="94" height="139" fill="none" stroke={W} strokeWidth={sw}/>
